<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adoption Hub</title>

    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    
    <script src="../assets/js/userSidebar.js"></script>
    <script src="../assets/js/userAdoptionHub.js"></script>
    
    <style>
        body {
            visibility: hidden;
        }

        #sidebar,
        #header {
            visibility: hidden;
        }

        .stepper-line {
            position: absolute;
            top: 1.15rem;
            left: 2.5rem;
            right: 2.5rem;
            height: 2px;
            background: #e2e8f0;
            z-index: 0;
        }

        .step-circle {
            transition: all 0.3s ease;
        }

        .upload-box-hover:hover {
            border-color: #94a3b8;
        }

        .btn-back-hover:hover {
            transform: translateX(-3px);
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

    </style>
</head>

<body class="bg-gray-100 h-full overflow-hidden">

    <!-- ===== SIDEBAR ===== -->
    <div id="sidebar" class="fixed left-0 top-0 w-64 h-screen bg-white border-r border-gray-200 z-50"></div>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="ml-64 pt-24 h-screen overflow-hidden bg-gray-50">

        <!-- ===== HEADER ===== -->
        <div id="header" class="fixed top-0 left-64 right-0 h-24 bg-white border-b border-gray-200 z-40"></div>

        <!-- ===== ADOPTION HUB ===== -->
        <div class="h-[calc(100vh-6rem)] overflow-y-auto p-6 lg:p-8">
            <div class="max-w-7xl mx-auto">
                
                <!-- SEARCH & FILTER -->
                <div class="bg-white rounded-2xl shadow-sm p-3 mb-6 -mt-4 flex flex-col md:flex-row gap-4">
                    <input type="text" id="search-input" placeholder="Search pet name or breed..." class="flex-1 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400" />
                    <select id="type-filter" class="border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400">
                        <option value="All">All Types</option>
                        <option value="Dog">Dog</option>
                        <option value="Cat">Cat</option>
                    </select>
                </div>

                <!-- LIST VIEW -->
                <div id="list-view">
                    <div id="pet-grid" class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-5"></div>
                </div>

                <!-- MODAL VIEW -->
                <div id="viewPetModal" class="fixed inset-0 hidden z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-6">
                    <div class="bg-white rounded-3xl w-full max-w-6xl max-h-[90vh] overflow-hidden flex">
                        
                        <!-- LEFT -->
                        <div class="w-1/3 bg-gray-50 border-r p-6">
                            <img id="modalImage" class="w-full rounded-2xl aspect-square object-cover mb-4" alt="Pet Image">

                            <div class="space-y-3">
                                <div class="bg-white rounded-xl border p-3">
                                    <p class="text-[11px] font-bold text-blue-700 mb-2">Species</p>
                                    <p id="modalSpecies" class="font-semibold text-slate-800 mt-1"></p>
                                </div>

                                <div class="bg-white rounded-xl border p-3">
                                    <p class="text-[11px] font-bold text-blue-700 mb-2">Gender</p>
                                    <p id="modalGender" class="font-semibold mt-1"></p>
                                </div>

                                <div class="bg-white rounded-xl border p-3">
                                    <p class="text-[11px] font-bold text-blue-700 mb-2">Age</p>
                                    <p id="modalAge" class="font-semibold mt-1"></p>
                                </div>
                            </div>
                        </div>

                        <!-- RIGHT -->
                        <div class="flex-1 overflow-y-auto hide-scrollbar p-5">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h1 id="modalName" class="text-4xl font-bold"></h1>
                                   <div class="flex flex-wrap gap-3 mt-4">
                                        <!-- Adoption Status -->
                                        <span id="modalStatus" class="px-4 py-2 rounded-full text-sm font-medium"></span>

                                        <!-- Health -->
                                        <span id="modalHealth" class="px-4 py-2 rounded-full text-sm font-medium"></span>

                                        <!-- Vaccination -->
                                        <span id="modalVaccination" class="px-4 py-2 rounded-full text-sm font-medium"></span>
                                    </div>
                                </div>
                                <button onclick="closePetModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                                    <i class="fa-solid fa-xmark text-3xl"></i>
                                </button>
                            </div>

                            <div class="mt-5">
                                <h3 class="font-bold text-blue-700 mb-2">Personality</h3>
                                <div id="modalTags" class="flex flex-wrap gap-2"></div>
                            </div>

                            <div class="mt-5">
                                <h3 class="font-bold text-blue-700 mb-2">Behavior</h3>
                                <p id="modalBehavior" class="text-gray-600 leading-relaxed text-justify"></p>
                            </div>

                            <!-- Medical History -->
                            <div class="mt-5">
                                <h3 class="font-bold text-blue-700 mb-2">Medical History</h3>

                                <div class="overflow-x-auto border rounded-2xl">
                                    <table class="w-full">
                                        <thead class="bg-blue-700 text-white">
                                            <tr>
                                                <th class="text-left p-3">Treatment</th>
                                                <th class="text-left p-3">Date</th>
                                                <th class="text-left p-3">Administered By</th>
                                            </tr>
                                        </thead>
                                        <tbody id="modalMedicalBody">
                                            <tr>
                                                <td colspan="3" class="text-center p-6 text-gray-400">
                                                    No medical records.
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <button class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors">
                                Apply for Adoption
                            </button>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
