<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adoption Hub</title>

    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet" />

    <style>
        body {
            visibility: hidden;
        }

        #sidebar,
        #header {
            visibility: hidden;
        }
        .stepper-line {
            position: absolute;
            top: 1.15rem;
            left: 2.5rem;
            right: 2.5rem;
            height: 2px;
            background: #e2e8f0;
            z-index: 0;
        }
        .step-circle {
            transition: all 0.3s ease;
        }
        .upload-box-hover:hover {
            border-color: #94a3b8;
        }
        .btn-back-hover:hover {
            transform: translateX(-3px);
        }
    </style>
</head>

<body class="bg-gray-100 h-full overflow-hidden">

    <!-- ===== SIDEBAR ===== -->
    <div id="sidebar" class="fixed left-0 top-0 w-64 h-screen bg-white border-r border-gray-200 z-50">
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="ml-64 pt-24 h-screen overflow-hidden bg-gray-50">

        <!-- ===== HEADER ===== -->
        <div id="header" class="fixed top-0 left-64 right-0 h-24 bg-white border-b border-gray-200 z-40">
        </div>

        <!-- ===== ADOPTION HUB ===== -->
        <div class="h-[calc(100vh-6rem)] overflow-y-auto p-6 lg:p-8">

            <div class="max-w-7xl mx-auto">
                <!-- SEARCH & FILTER -->
                <div class="bg-white rounded-2xl shadow-sm p-2 mb-8 flex flex-col md:flex-row gap-4 -mt-4">
                    <input type="text" id="search-input" placeholder="Search pet name or breed..."
                    class="flex-1 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400" />
                    <select id="type-filter"
                    class="border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="All">All Types</option>
                    <option value="Dog">Dog</option>
                    <option value="Cat">Cat</option>
                </select>
        </div>

        <!-- LIST VIEW -->
        <div id="list-view">

            <div id="pet-grid"
                class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-5 -mt-4">
            </div>
    </div>

<div id="viewPetModal"
class="fixed inset-0 hidden z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-6">

<div class="bg-white rounded-3xl w-full max-w-5xl max-h-[90vh] overflow-hidden flex">

    <!-- LEFT -->

    <div class="w-1/3 bg-gray-50 border-r p-6">

        <img
        id="modalImage"
        class="w-full rounded-2xl aspect-square object-cover">

        <div class="mt-6 space-y-4">

            <div>
                <p class="text-xs text-gray-400 uppercase">Species</p>
                <p id="modalSpecies" class="font-semibold"></p>
            </div>

            <div>
                <p class="text-xs text-gray-400 uppercase">Gender</p>
                <p id="modalGender"></p>
            </div>

            <div>
                <p class="text-xs text-gray-400 uppercase">Age</p>
                <p id="modalAge"></p>
            </div>

            <div>
                <p class="text-xs text-gray-400 uppercase">Birth Date</p>
                <p id="modalBirth"></p>
            </div>

            <div>
                <p class="text-xs text-gray-400 uppercase">Color</p>
                <p id="modalColor"></p>
            </div>

        </div>

    </div>

    <!-- RIGHT -->

    <div class="flex-1 overflow-y-auto p-8">

        <div class="flex justify-between">

            <div>

                <h1 id="modalName"
                class="text-4xl font-bold"></h1>

                <div class="flex gap-3 mt-4">

                    <span id="modalStatus"
                    class="bg-green-100 text-green-700 px-4 py-2 rounded-full"></span>

                    <span id="modalHealth"
                    class="bg-orange-100 text-orange-700 px-4 py-2 rounded-full"></span>

                </div>

            </div>

            <button onclick="closePetModal()">

                <i class="fa-solid fa-xmark text-3xl"></i>

            </button>

        </div>

        <div class="mt-8">

            <h3 class="font-bold mb-3">
                Personality
            </h3>

            <div id="modalTags"
            class="flex flex-wrap gap-2"></div>

        </div>

        <div class="mt-8">

            <h3 class="font-bold mb-2">
                Behavior
            </h3>

            <p id="modalBehavior"></p>

        </div>

        <div class="grid grid-cols-2 gap-4 mt-8">

            <div class="border rounded-xl p-4">

                <p class="text-xs uppercase text-gray-400">
                    Health
                </p>

                <p id="modalHealthStatus"></p>

            </div>

            <div class="border rounded-xl p-4">

                <p class="text-xs uppercase text-gray-400">
                    Vaccination
                </p>

                <p id="modalVaccination"></p>

            </div>

        </div>

        <button
        class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl">

            Apply for Adoption

        </button>

    </div>

</div>

</div>

</div>

</main>

<script>
    async function loadComponent(id, file) {
        try {
            const response = await fetch(file);

            if (!response.ok) {
                throw new Error(`Cannot load ${file}`);
            }

            document.getElementById(id).innerHTML = await response.text();

        } catch (error) {
            console.error(error);
        }
    }

    function loadTopbar({ title = "", subtitle = "" }) {
        const titleEl = document.getElementById("pageTitle");
        const subtitleEl = document.getElementById("pageSubtitle");

        if (titleEl) {
            titleEl.textContent = title;
        }

        if (subtitleEl) {
            subtitleEl.textContent = subtitle;
        }
    }

    Promise.all([
        loadComponent("sidebar", "/user/userSidebar.html"),
        loadComponent("header", "/user/userHeader.html")
    ])
    .then(() => {

        // Show loaded components
        document.getElementById("sidebar").style.visibility = "visible";
        document.getElementById("header").style.visibility = "visible";

        // Wait until the header HTML is inserted
        setTimeout(() => {

            loadTopbar({
                title: "Adoption Hub",
                subtitle: "Browse available pets and submit adoption applications."
            });

        }, 0);

        // Highlight active sidebar link
        const currentPath = window.location.pathname;

        document.querySelectorAll("#sidebar .nav-link").forEach(link => {

            const href = link.getAttribute("href");

            const active =
                href === currentPath ||
                (href !== "/dashboard" && currentPath.startsWith(href));

            if (active) {
                link.className =
                    "nav-link flex items-center gap-4 px-5 py-4 rounded-2xl bg-blue-600 text-white shadow";
            } else {
                link.className =
                    "nav-link flex items-center gap-4 px-5 py-4 rounded-2xl text-gray-800 hover:bg-blue-50 hover:text-blue-600 transition";
            }
        });

        document.body.style.visibility = "visible";

    })
    .catch(console.error);
</script>

<!-- ===== ADOPTION HUB SCRIPT ===== -->
<script>
let petsData = [];

async function loadPets() {
    try {

        const response = await fetch("/api/pets");
        const data = await response.json();

        if (!data.success) {
            alert("Unable to load pets.");
            return;
        }

        petsData = data.pets.map(pet => ({
            animal_id: pet.animal_id,
            name: pet.name,
            breed: pet.personality_tags || "No tags",
            type: pet.species,
            species: pet.species,
            gender: pet.gender,
            age: pet.age,
            color: pet.color,
            behavior: pet.behavior_description,
            status: pet.adoption_status,
            organization: pet.organization_name,
            img: pet.image_path
                ? `/uploads/pets/${pet.image_path}`
                : "/assets/images/no-image.png"
        }));

        renderGrid();

    } catch (err) {

        console.error(err);

    }
}
function renderGrid() {

    const grid = document.getElementById("pet-grid");

    if (!petsData.length) {
        grid.innerHTML = `
            <div class="col-span-full text-center py-10 text-gray-500">
                No pets available for adoption.
            </div>
        `;
        return;
    }

    grid.innerHTML = petsData.map(pet => `
<div class="bg-white rounded-3xl overflow-hidden border border-gray-200 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300">

    <!-- Image -->
    <div class="relative">

        <img
            src="${pet.img}"
            alt="${pet.name}"
            class="w-full h-52 object-cover"
        >

        <!-- Species -->
        <span
            class="absolute top-4 left-4
            px-4 py-2 rounded-full
            text-white text-xs font-bold shadow
            ${
                pet.species.toLowerCase() === "dog"
                    ? "bg-blue-500"
                    : "bg-orange-500"
            }">

            ${pet.species.toUpperCase()}

        </span>

        <!-- Status -->
        <span class="absolute top-4 right-4
            px-4 py-2 rounded-full
            bg-green-500 text-white
            text-xs font-bold shadow">

            ${pet.status.toUpperCase()}

        </span>

    </div>

    <!-- Body -->
    <div class="p-6">

        <!-- Name -->
        <h2 class="text-3xl font-bold text-gray-800">

            ${pet.name}

        </h2>


        <!-- Species Age Gender -->
        <div class="flex flex-wrap items-center gap-2 mt-3 text-gray-600 text-sm font-bold">

            <span>${pet.species}</span>

            <span>•</span>

            <span>${pet.age}</span>

            <span>•</span>

            <span class="${
                pet.gender === "Male"
                    ? "text-blue-500"
                    : "text-pink-500"
            } font-semibold">

                <i class="fas ${
                    pet.gender === "Male"
                        ? "fa-mars"
                        : "fa-venus"
                } mr-1"></i>

                ${pet.gender}

            </span>

        </div>

        <!-- Personality Tags -->
        <div class="flex flex-wrap gap-2 mt-3">

            ${
                pet.breed
                    .split(",")
                    .map(tag => `
                        <span
                            class="px-4 py-1.5
                                   rounded-full
                                   border border-gray-300
                                   bg-white
                                   text-gray-700
                                   text-sm
                                   font-medium
                                   hover:border-blue-400
                                   hover:text-blue-600
                                   transition">

                            ${tag.trim()}

                        </span>
                    `)
                    .join("")
            }

        </div>

          <!-- Organization -->
        <p class="text-blue-500 mt-8 flex items-center gap-2">
            <i class="fas fa-building"></i>
            ${pet.organization}
        </p>

        <!-- Button -->
        <button
            class="view-btn
                   w-full
                   mt-6
                   py-3
                   rounded-2xl
                   border
                   border-gray-300
                   bg-white
                   text-blue-600
                   font-semibold
                   text-lg
                   hover:bg-blue-600
                   hover:text-white
                   hover:border-blue-600
                   transition"
            data-id="${pet.animal_id}">

            View Profile

        </button>

    </div>

</div>
    `).join("");

}
loadPets();
document.addEventListener("click", e => {

    const btn = e.target.closest(".view-btn");

    if(!btn) return;

    const id = Number(btn.dataset.id);

    const pet = petsData.find(p => p.animal_id == id);

    if(pet){

        openPetModal(pet);

    }

});
function openPetModal(pet){

    document.getElementById("modalImage").src = pet.img;

    document.getElementById("modalName").textContent = pet.name;

    document.getElementById("modalSpecies").textContent = pet.species;

    document.getElementById("modalGender").textContent = pet.gender;

    document.getElementById("modalAge").textContent = pet.age;

    document.getElementById("modalBirth").textContent =
        pet.birth_date || "Unknown";

    document.getElementById("modalColor").textContent =
        pet.color || "Unknown";

    document.getElementById("modalStatus").textContent =
        pet.status;

    document.getElementById("modalHealth").textContent =
        pet.health || "Healthy";

    document.getElementById("modalBehavior").textContent =
        pet.behavior || "No description.";

    document.getElementById("modalHealthStatus").textContent =
        pet.health || "Healthy";

    document.getElementById("modalVaccination").textContent =
        pet.vaccination || "Unknown";

    const tags = document.getElementById("modalTags");

    tags.innerHTML = "";

    if(pet.personality){

        pet.personality.split(",").forEach(tag=>{

            tags.innerHTML += `
                <span class="px-4 py-2 rounded-full border border-gray-300 bg-gray-50">
                    ${tag.trim()}
                </span>
            `;

        });

    }

    document.getElementById("viewPetModal").classList.remove("hidden");

    document.getElementById("viewPetModal").classList.add("flex");

}

function closePetModal(){

    document.getElementById("viewPetModal").classList.add("hidden");

    document.getElementById("viewPetModal").classList.remove("flex");

}
</script>

</body>

</html>
