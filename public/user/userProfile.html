<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile</title>

    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f3f4f6;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        .field-disabled {
            background-color: #f9fafb;
            color: #374151;
        }
        .transition-custom {
            transition: all 0.2s;
        }
    </style>
</head>

<body class="bg-white">

    <!-- ===== SIDEBAR ===== -->
    <div id="sidebar"></div>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="ml-64 min-h-screen bg-gray-100">

        <!-- ===== HEADER ===== -->
        <div id="header" class="sticky top-0 z-20 bg-white"></div>

        <!-- ===== PROFILE PAGE ===== -->
        <div class="p-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 max-w-5xl mx-auto">

                <!-- ===== TOP PROFILE ===== -->
                <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-6">

                    <!-- LEFT: Avatar & Name -->
                    <div class="flex items-center gap-5">
                        <div class="w-24 h-24 rounded-full bg-blue-100 flex items-center justify-center">
                            <i class="fas fa-user text-5xl text-blue-500"></i>
                        </div>

                        <div>
                            <h1 id="display-name" class="text-3xl font-bold text-gray-800">Jhyzeel Dianela</h1>

                            <div class="mt-2 inline-flex items-center gap-2 bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm">
                                <i class="fas fa-user text-xs"></i>
                                <span id="display-account-type">User</span>
                            </div>

                            <div class="flex items-center gap-2 mt-4 text-gray-500 text-sm">
                                <i class="fas fa-calendar-alt"></i>
                                <span>Member since February 20, 2026</span>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT: Edit / Save / Cancel Buttons -->
                    <div id="action-buttons">
                        <!-- Edit button (visible when not editing) -->
                        <button id="edit-btn" class="flex items-center gap-2 border border-blue-500 text-blue-500 px-4 py-2 rounded-lg hover:bg-blue-50 transition-custom">
                            <i class="fas fa-edit"></i>
                            Edit Profile
                        </button>

                        <!-- Save & Cancel buttons (hidden by default) -->
                        <div id="edit-actions" class="hidden flex gap-3">
                            <button id="save-btn" class="flex items-center gap-2 bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-custom">
                                <i class="fas fa-save"></i>
                                Save
                            </button>
                            <button id="cancel-btn" class="flex items-center gap-2 border border-red-400 text-red-500 px-4 py-2 rounded-lg hover:bg-red-50 transition-custom">
                                <i class="fas fa-times"></i>
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ===== PERSONAL INFORMATION ===== -->
                <div class="mt-10">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-500">
                            <i class="fas fa-user"></i>
                        </div>
                        <h2 class="text-xl font-semibold text-gray-800">Personal Information</h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <!-- FULL NAME -->
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">Full Name</label>
                            <div id="full-name-display" class="border border-gray-200 rounded-xl px-4 py-3 bg-gray-50">
                                Jhyzeel Dianela
                            </div>
                            <input id="full-name-input" type="text" value="Jhyzeel Dianela" class="hidden w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300" />
                        </div>

                        <!-- EMAIL -->
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">Email Address</label>
                            <div id="email-display" class="border border-gray-200 rounded-xl px-4 py-3 bg-gray-50">
                                jhdianela@gmail.com
                            </div>
                            <input id="email-input" type="email" value="jhdianela@gmail.com" class="hidden w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300" />
                        </div>

                        <!-- MOBILE -->
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">Mobile Number</label>
                            <div id="mobile-display" class="border border-gray-200 rounded-xl px-4 py-3 bg-gray-50">
                                09924974712
                            </div>
                            <input id="mobile-input" type="text" value="09924974712" class="hidden w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300" />
                        </div>

                        <!-- ACCOUNT TYPE -->
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">Account Type</label>
                            <div class="border border-gray-200 rounded-xl px-4 py-3 bg-gray-50">
                                User
                            </div>
                        </div>

                    </div>
                </div>

                <!-- ===== ACCOUNT SECURITY ===== -->
                <div class="mt-10 border border-gray-200 rounded-2xl p-5">

                    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-500">
                                <i class="fas fa-shield-alt"></i>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Account Security</h3>
                                <p class="text-sm text-gray-500">Keep your account secure and updated</p>
                            </div>
                        </div>

                        <button id="toggle-password-btn" class="flex items-center gap-2 border border-blue-500 text-blue-500 px-4 py-2 rounded-lg hover:bg-blue-50 transition-custom">
                            <i class="fas fa-lock"></i>
                            Change Password
                        </button>
                    </div>

                    <!-- PASSWORD FORM (hidden by default) -->
                    <div id="password-form" class="hidden mt-6 grid grid-cols-1 gap-4">

                        <input id="current-password" type="password" placeholder="Current Password" class="border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300" />

                        <input id="new-password" type="password" placeholder="New Password" class="border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300" />

                        <input id="confirm-password" type="password" placeholder="Confirm New Password" class="border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300" />

                        <button id="update-password-btn" class="bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-xl transition-custom">
                            Update Password
                        </button>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <!-- ===== LOAD SIDEBAR & HEADER ===== -->
    <script>
        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) {
                    throw new Error(`Cannot load ${file}`);
                }
                document.getElementById(id).innerHTML = await response.text();
            } catch (error) {
                console.error(error);
            }
        }

        loadComponent("sidebar", "/user/userSidebar.html");
        loadComponent("header", "/user/userHeader.html");
    </script>

    <!-- ===== PROFILE SCRIPT ===== -->
    <script>
        // ===== STATE =====
        let isEditing = false;
        let isPasswordFormVisible = false;

        // ===== USER DATA =====
        let userData = {
            fullName: "Jhyzeel Dianela",
            email: "jhdianela@gmail.com",
            mobile: "09924974712",
            accountType: "User"
        };

        // ===== DOM REFS =====
        const displayName = document.getElementById('display-name');
        const displayAccountType = document.getElementById('display-account-type');

        const fullNameDisplay = document.getElementById('full-name-display');
        const fullNameInput = document.getElementById('full-name-input');
        const emailDisplay = document.getElementById('email-display');
        const emailInput = document.getElementById('email-input');
        const mobileDisplay = document.getElementById('mobile-display');
        const mobileInput = document.getElementById('mobile-input');

        const editBtn = document.getElementById('edit-btn');
        const editActions = document.getElementById('edit-actions');
        const saveBtn = document.getElementById('save-btn');
        const cancelBtn = document.getElementById('cancel-btn');

        const togglePasswordBtn = document.getElementById('toggle-password-btn');
        const passwordForm = document.getElementById('password-form');
        const currentPassword = document.getElementById('current-password');
        const newPassword = document.getElementById('new-password');
        const confirmPassword = document.getElementById('confirm-password');
        const updatePasswordBtn = document.getElementById('update-password-btn');

        // ===== FUNCTIONS =====

        function updateDisplay() {
            displayName.textContent = userData.fullName;
            displayAccountType.textContent = userData.accountType;

            fullNameDisplay.textContent = userData.fullName;
            fullNameInput.value = userData.fullName;

            emailDisplay.textContent = userData.email;
            emailInput.value = userData.email;

            mobileDisplay.textContent = userData.mobile;
            mobileInput.value = userData.mobile;
        }

        function enterEditMode() {
            isEditing = true;
            editBtn.classList.add('hidden');
            editActions.classList.remove('hidden');

            // Show inputs, hide displays
            fullNameDisplay.classList.add('hidden');
            fullNameInput.classList.remove('hidden');
            emailDisplay.classList.add('hidden');
            emailInput.classList.remove('hidden');
            mobileDisplay.classList.add('hidden');
            mobileInput.classList.remove('hidden');
        }

        function exitEditMode() {
            isEditing = false;
            editBtn.classList.remove('hidden');
            editActions.classList.add('hidden');

            // Show displays, hide inputs
            fullNameDisplay.classList.remove('hidden');
            fullNameInput.classList.add('hidden');
            emailDisplay.classList.remove('hidden');
            emailInput.classList.add('hidden');
            mobileDisplay.classList.remove('hidden');
            mobileInput.classList.add('hidden');

            // Reset to saved data
            updateDisplay();
        }

        function saveProfile() {
            // Update userData from inputs
            userData.fullName = fullNameInput.value.trim() || userData.fullName;
            userData.email = emailInput.value.trim() || userData.email;
            userData.mobile = mobileInput.value.trim() || userData.mobile;

            updateDisplay();
            exitEditMode();

            alert('Profile Updated Successfully!');
            // In a real app: API call to save
        }

        function cancelEdit() {
            exitEditMode();
        }

        function togglePasswordForm() {
            isPasswordFormVisible = !isPasswordFormVisible;
            if (isPasswordFormVisible) {
                passwordForm.classList.remove('hidden');
                togglePasswordBtn.innerHTML = '<i class="fas fa-times"></i> Cancel';
                togglePasswordBtn.classList.remove('border-blue-500', 'text-blue-500');
                togglePasswordBtn.classList.add('border-red-400', 'text-red-500');
            } else {
                passwordForm.classList.add('hidden');
                togglePasswordBtn.innerHTML = '<i class="fas fa-lock"></i> Change Password';
                togglePasswordBtn.classList.remove('border-red-400', 'text-red-500');
                togglePasswordBtn.classList.add('border-blue-500', 'text-blue-500');
                // Clear password fields
                currentPassword.value = '';
                newPassword.value = '';
                confirmPassword.value = '';
            }
        }

        function updatePassword() {
            const current = currentPassword.value.trim();
            const newPwd = newPassword.value.trim();
            const confirm = confirmPassword.value.trim();

            if (!current || !newPwd || !confirm) {
                alert('Please fill in all password fields.');
                return;
            }

            if (newPwd !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            if (newPwd.length < 6) {
                alert('New password must be at least 6 characters long.');
                return;
            }

            alert('Password Changed Successfully!');
            // In a real app: API call to update password

            // Clear and close
            currentPassword.value = '';
            newPassword.value = '';
            confirmPassword.value = '';
            togglePasswordForm();
        }

        // ===== EVENT LISTENERS =====

        editBtn.addEventListener('click', enterEditMode);
        saveBtn.addEventListener('click', saveProfile);
        cancelBtn.addEventListener('click', cancelEdit);

        togglePasswordBtn.addEventListener('click', togglePasswordForm);
        updatePasswordBtn.addEventListener('click', updatePassword);

        // Allow Enter key on password fields to submit
        document.querySelectorAll('#password-form input').forEach(input => {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    updatePassword();
                }
            });
        });

        // ===== INIT =====
        updateDisplay();
    </script>

</body>
</html>
