<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile</title>

    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
         *{
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    overscroll-behavior:none;
    visibility: hidden;

}
#sidebar,
#header{
    visibility:hidden;
}

        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        .field-disabled {
            background-color: #f9fafb;
            color: #374151;
        }
        .transition-custom {
            transition: all 0.2s;
        }

        /* Avatar edit overlay */
        .avatar-container {
            position: relative;
            cursor: default;
        }
        .avatar-container .avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            transition: all 0.3s;
        }
        .avatar-container.editable .avatar-overlay {
            display: flex;
            cursor: pointer;
        }
        .avatar-container.editable .avatar-overlay:hover {
            background: rgba(0, 0, 0, 0.65);
        }
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .avatar-container .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #dbeafe;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2563eb;
            font-size: 44px;
        }
    </style>
</head>

<body class="bg-gray-100 h-full overflow-hidden">

    <!-- ===== SIDEBAR ===== -->
    <div
        id="sidebar"
        class="fixed left-0 top-0 w-64 h-screen bg-white border-r border-gray-200 z-50">
    </div>
    <!-- ===== MAIN CONTENT ===== -->
    <main class="ml-64 pt-24 h-screen overflow-hidden bg-gray-50">

        <!-- ===== HEADER ===== -->
        <div
            id="header"
            class="fixed top-0 left-64 right-0 h-24 bg-white border-b border-gray-200 z-40">
        </div>

        <!-- ===== PROFILE PAGE ===== -->
         <div class="h-[calc(100vh-6rem)] overflow-y-auto p-8">

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 max-w-5xl mx-auto">
                <!-- ===== TOP PROFILE ===== -->
                <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-6">

                    <!-- LEFT: Avatar & Name -->
                    <div class="flex items-center gap-5">
                        <!-- Avatar container -->
                        <div class="avatar-container w-24 h-24 flex-shrink-0" id="avatarContainer">
                            <div id="avatarDisplay" class="avatar-placeholder">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="avatar-overlay" id="avatarOverlay">
                                <i class="fas fa-camera"></i>
                            </div>
                            <input type="file" id="avatarInput" accept="image/*" class="hidden" />
                        </div>

                        <div>
                            <h1 id="display-name" class="text-3xl font-bold text-gray-800">Jhyzeel Dianela</h1>

                            <div class="mt-2 inline-flex items-center gap-2 bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm">
                                <i class="fas fa-user text-xs"></i>
                                <span id="display-account-type">User</span>
                            </div>

                            <div class="flex items-center gap-2 mt-4 text-gray-500 text-sm">
                                <i class="fas fa-calendar-alt"></i>
                                <span>Member since February 20, 2026</span>
                            </div>
                        </div>
                    </div>
                    <div id="action-buttons">
                        <!-- Edit button (visible when not editing) -->
                        <button id="edit-btn" class="flex items-center gap-2 border border-blue-500 text-blue-500 px-4 py-2 rounded-lg hover:bg-blue-50 transition-custom">
                            <i class="fas fa-edit"></i>
                            Edit Profile
                        </button>
                        <div id="edit-actions" class="hidden flex gap-3">
                            <button id="save-btn" class="flex items-center gap-2 bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-custom">
                                <i class="fas fa-save"></i>
                                Save
                            </button>
                            <button id="cancel-btn" class="flex items-center gap-2 border border-red-400 text-red-500 px-4 py-2 rounded-lg hover:bg-red-50 transition-custom">
                                <i class="fas fa-times"></i>
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
                <div class="mt-10">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-500">
                            <i class="fas fa-user"></i>
                        </div>
                        <h2 class="text-xl font-semibold text-gray-800">Personal Information</h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">Full Name</label>
                            <div id="full-name-display" class="border border-gray-200 rounded-xl px-4 py-3 bg-gray-50">
                                Jhyzeel Dianela
                            </div>
                            <input id="full-name-input" type="text" value="Jhyzeel Dianela" class="hidden w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300" />
                        </div>

                        <!-- EMAIL -->
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">Email Address</label>
                            <div id="email-display" class="border border-gray-200 rounded-xl px-4 py-3 bg-gray-50">
                                jhdianela@gmail.com
                            </div>
                            <input id="email-input" type="email" value="jhdianela@gmail.com" class="hidden w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300" />
                        </div>

                        <!-- MOBILE -->
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">Mobile Number</label>
                            <div id="mobile-display" class="border border-gray-200 rounded-xl px-4 py-3 bg-gray-50">
                                09924974712
                            </div>
                            <input id="mobile-input" type="text" value="09924974712" class="hidden w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300" />
                        </div>

                        <!-- ACCOUNT TYPE -->
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">Account Type</label>
                            <div class="border border-gray-200 rounded-xl px-4 py-3 bg-gray-50">
                                User
                            </div>
                        </div>

                    </div>
                </div>
                <div class="mt-10 border border-gray-200 rounded-2xl p-5">

                    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-500">
                                <i class="fas fa-shield-alt"></i>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">Account Security</h3>
                                <p class="text-sm text-gray-500">Keep your account secure and updated</p>
                            </div>
                        </div>

                        <button id="toggle-password-btn" class="flex items-center gap-2 border border-blue-500 text-blue-500 px-4 py-2 rounded-lg hover:bg-blue-50 transition-custom">
                            <i class="fas fa-lock"></i>
                            Change Password
                        </button>
                    </div>

                    <!-- PASSWORD FORM (hidden by default) -->
                    <div id="password-form" class="hidden mt-6 grid grid-cols-1 gap-4">

                        <input id="current-password" type="password" placeholder="Current Password" class="border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300" />

                        <input id="new-password" type="password" placeholder="New Password" class="border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300" />

                        <input id="confirm-password" type="password" placeholder="Confirm New Password" class="border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300" />

                        <button id="update-password-btn" class="bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-xl transition-custom">
                            Update Password
                        </button>
                    </div>
                </div>

            </div>
        </div>

    </main>
   <script>
        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) {
                    throw new Error(`Cannot load ${file}`);
                }
                document.getElementById(id).innerHTML = await response.text();
            } catch (error) {
                console.error(error);
            }
        }

        Promise.all([
            loadComponent("sidebar", "/user/userSidebar.html"),
            loadComponent("header", "/user/userHeader.html")
        ])
        .then(() => {
            
            document.getElementById("sidebar").style.visibility = "visible";
            document.getElementById("header").style.visibility = "visible";

            const currentPath = window.location.pathname;
            const pageTitle = document.getElementById("pageTitle");
            const customTitles = {
                "/profile": "Profile",
                "/cash-donation": "Donation",
                "/inkind-donation": "Donation"
            };
            if (pageTitle && customTitles[currentPath]) {
                pageTitle.textContent = customTitles[currentPath];
            }

            const links = document.querySelectorAll("#sidebar .nav-link");
            links.forEach(link => {
                const href = link.getAttribute("href");
                const isActive = href === currentPath || (href !== "/dashboard" && currentPath.startsWith(href));

                if (isActive) {
                    link.className = "nav-link flex items-center gap-4 px-5 py-4 rounded-2xl bg-blue-600 text-white shadow";
                    if (pageTitle && !customTitles[currentPath]) {
                        pageTitle.textContent = link.dataset.title;
                    }
                } else {
                    link.className = "nav-link flex items-center gap-4 px-5 py-4 rounded-2xl text-gray-800 hover:bg-blue-50 hover:text-blue-600 transition";
                }
            });

            document.body.style.visibility = "visible";
        })
        .catch(error => console.error(error));

        let isEditing = false;
        let isPasswordFormVisible = false;

        
        const displayName = document.getElementById('display-name');
        const displayAccountType = document.getElementById('display-account-type');
        const memberSinceText = document.querySelector('.fa-calendar-alt').nextElementSibling;

        const fullNameDisplay = document.getElementById('full-name-display');
        const fullNameInput = document.getElementById('full-name-input');
        const emailDisplay = document.getElementById('email-display');
        const emailInput = document.getElementById('email-input');
        const mobileDisplay = document.getElementById('mobile-display');
        const mobileInput = document.getElementById('mobile-input');

        const editBtn = document.getElementById('edit-btn');
        const editActions = document.getElementById('edit-actions');
        const saveBtn = document.getElementById('save-btn');
        const cancelBtn = document.getElementById('cancel-btn');

        const togglePasswordBtn = document.getElementById('toggle-password-btn');
        const passwordForm = document.getElementById('password-form');
        const currentPassword = document.getElementById('current-password');
        const newPassword = document.getElementById('new-password');
        const confirmPassword = document.getElementById('confirm-password');
        const updatePasswordBtn = document.getElementById('update-password-btn');

       
        const avatarContainer = document.getElementById('avatarContainer');
        const avatarOverlay = document.getElementById('avatarOverlay');
        const avatarInput = document.getElementById('avatarInput');
        const avatarDisplay = document.getElementById('avatarDisplay');

      
        function setAvatarEditMode(editable) {
            const container = document.getElementById('avatarContainer');
            if(container) {
                if(editable) container.classList.add('editable');
                else container.classList.remove('editable');
            }
        }
        async function fetchProfileData() {
            try {
                const response = await fetch('/api/user/profile');
                if (!response.ok) throw new Error("Failed to fetch profile");
                
                const data = await response.json();
                
                const fName = data.first_name || '';
                const lName = data.last_name || '';
                const fullCombinedName = `${fName} ${lName}`.trim() || 'No Name Set';

                displayName.textContent = fullCombinedName;
                displayAccountType.textContent = data.role ? data.role.toUpperCase() : 'USER';
                
                fullNameDisplay.textContent = fullCombinedName;
                fullNameInput.value = fullCombinedName;

                emailDisplay.textContent = data.email || '';
                emailInput.value = data.email || '';

                mobileDisplay.textContent = data.phone_number || 'N/A';
                mobileInput.value = data.phone_number || '';

                
                if (data.profile_picture) {
                    avatarDisplay.innerHTML = `<img src="${data.profile_picture}" alt="Profile Picture" class="w-full h-full object-cover rounded-full">`;
                } else {
                    avatarDisplay.innerHTML = `<i class="fas fa-user"></i>`;
                }

                if (data.created_at) {
                    const date = new Date(data.created_at);
                    memberSinceText.textContent = `Member since ${date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
                }

            } catch (error) {
                console.error("Error loading profile:", error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchProfileData();
            setAvatarEditMode(false);
        });

 
       function enterEditMode() {
        isEditing = true;
        editBtn.classList.add('hidden');
        editActions.classList.remove('hidden');

        fullNameDisplay.classList.add('hidden');
        fullNameInput.classList.remove('hidden');
        emailDisplay.classList.add('hidden');
        emailInput.classList.remove('hidden');
        mobileDisplay.classList.add('hidden');
        mobileInput.classList.remove('hidden');
        
        if (avatarOverlay) {
            avatarOverlay.classList.remove('hidden');
            avatarOverlay.style.opacity = "1"; 
        }
        setAvatarEditMode(true);
    }

    function exitEditMode() {
        isEditing = false;
        editBtn.classList.remove('hidden');
        editActions.classList.add('hidden');

        fullNameDisplay.classList.remove('hidden');
        fullNameInput.classList.add('hidden');
        emailDisplay.classList.remove('hidden');
        emailInput.classList.add('hidden');
        mobileDisplay.classList.remove('hidden');
        mobileInput.classList.add('hidden');
        
      
        if (avatarOverlay) {
            avatarOverlay.classList.add('hidden');
            avatarOverlay.style.opacity = "0";
        }
        setAvatarEditMode(false);
    }

        // ==========================================
        // SAVE PROFILE TO DATABASE DYNAMICALLY
        // ==========================================
        async function saveProfile() {
            const updatedData = {
                fullName: fullNameInput.value.trim(),
                email: emailInput.value.trim(),
                mobile: mobileInput.value.trim()
            };

            if (!updatedData.fullName || !updatedData.email) {
                alert('Full name and Email cannot be left empty.');
                return;
            }

            try {
                const response = await fetch('/api/user/profile/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });

                const result = await response.json();

                if (result.success) {
                    alert('Profile Updated Successfully in Database!');
                    fetchProfileData();
                    exitEditMode();
                    
                    if(typeof loadComponent === "function") {
                       loadComponent("header", "/user/userHeader.html");
                    }
                } else {
                    alert('Failed to update profile: ' + result.error);
                }
            } catch (error) {
                console.error("Network update error:", error);
                alert('A network error occurred while updating profile.');
            }
        }

        function cancelEdit() {
            fetchProfileData(); 
            exitEditMode();
        }

        function togglePasswordForm() {
            isPasswordFormVisible = !isPasswordFormVisible;
            if (isPasswordFormVisible) {
                passwordForm.classList.remove('hidden');
                togglePasswordBtn.innerHTML = '<i class="fas fa-times"></i> Cancel Change';
                togglePasswordBtn.className = "flex items-center gap-2 border border-red-500 text-red-500 px-4 py-2 rounded-lg hover:bg-red-50 transition-custom";
            } else {
                passwordForm.classList.add('hidden');
                togglePasswordBtn.innerHTML = '<i class="fas fa-lock"></i> Change Password';
                togglePasswordBtn.className = "flex items-center gap-2 border border-blue-500 text-blue-500 px-4 py-2 rounded-lg hover:bg-blue-50 transition-custom";
                
                // Linisin ang input fields kapag sinarado
                currentPassword.value = '';
                newPassword.value = '';
                confirmPassword.value = '';
            }
        }

        
        async function updatePassword() {
            const currentPwd = currentPassword.value.trim();
            const newPwd = newPassword.value.trim();
            const confirm = confirmPassword.value.trim();

            if (!currentPwd || !newPwd || !confirm) {
                alert('Please fill in all password fields.');
                return;
            }

            if (newPwd !== confirm) {
                alert('New passwords do not match!');
                return;
            }

            if (newPwd.length < 6) {
                alert('New password must be at least 6 characters long.');
                return;
            }

            try {
                const response = await fetch('/api/user/profile/password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        currentPassword: currentPwd,
                        newPassword: newPwd
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert('Password Changed Successfully in Database!');
                    togglePasswordForm(); 
                } else {
                    alert('Failed to change password: ' + result.error);
                }
            } catch (error) {
                console.error("Network update error for password:", error);
                alert('A network error occurred while updating the password.');
            }
        }

        // ==========================================
        // DYNAMIC PROFILE PICTURE UPLOAD LOGIC
        // ==========================================
       
        avatarOverlay.addEventListener('click', () => {
            if (isEditing) {
                avatarInput.click();
            } else {
                alert('Please click "Edit Profile" first before changing your profile picture.');
            }
        });

        avatarInput.addEventListener('change', async function() {
            const file = this.files[0];
            if (!file) return;

          
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file.');
                return;
            }

            
            if (file.size > 2 * 1024 * 1024) {
                alert('File size is too large. Maximum limit is 2MB.');
                return;
            }

            const formData = new FormData();
            formData.append('avatar', file); 

            try {
                const response = await fetch('/api/user/profile/avatar', {
                    method: 'POST',
                    body: formData 
                });

               
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || `Server responded with status ${response.status}`);
                }

                const result = await response.json();

                if (result.success) {
                    alert('Profile picture uploaded successfully!');
                   
                    avatarDisplay.innerHTML = `<img src="${result.avatarUrl}" alt="Profile Picture" class="w-full h-full object-cover rounded-full">`;
                    
                    
                    if (typeof loadComponent === "function") {
                        loadComponent("header", "/user/userHeader.html");
                    }
                } else {
                    alert('Failed to upload: ' + result.error);
                }
            } catch (error) {
                console.error("Avatar upload error detailed:", error);
                alert('A network error occurred: ' + error.message);
            }
        });

        // Events listeners mapping
        editBtn.addEventListener('click', enterEditMode);
        saveBtn.addEventListener('click', saveProfile);
        cancelBtn.addEventListener('click', cancelEdit);
        
        togglePasswordBtn.addEventListener('click', togglePasswordForm);
        updatePasswordBtn.addEventListener('click', updatePassword);

        document.querySelectorAll('#password-form input').forEach(input => {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    updatePassword();
                }
            });
        });
    </script>
</body>
</html>
