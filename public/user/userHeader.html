<div class="h-24 bg-white border-b border-gray-200 shadow-sm px-8 flex items-center justify-between">
    <!-- LEFT -->
    <div>
        <h1 id="pageTitle" class="text-4xl font-bold text-blue-700">
            Dashboard
        </h1>
    </div>

    <!-- RIGHT -->
    <div class="flex items-center gap-5 relative">

        <!-- Notification -->
        <button
            id="notificationBtn"
            class="relative w-11 h-11 flex items-center justify-center rounded-full bg-gray-100 hover:bg-blue-50 transition">

            <i class="fas fa-bell text-xl text-blue-900"></i>

            <!-- Red Dot -->
            <span class="absolute top-2 right-2 w-2.5 h-2.5 rounded-full bg-red-500"></span>

        </button>

        <!-- Notification Popup -->
        <div
            id="notificationPopup"
            class="hidden absolute top-14 right-16 w-80 bg-white border border-gray-200 rounded-2xl shadow-xl p-5 z-50">

            <h3 class="text-lg font-semibold text-gray-800 mb-4">
                Notifications
            </h3>

            <ul class="space-y-3 text-sm text-gray-600">

                <li class="border-b pb-2">
                    🐶 Your adoption request has been approved.
                </li>

                <li class="border-b pb-2">
                    💰 Thank you for your donation.
                </li>

                <li>
                    📢 New pets are available for adoption.
                </li>

            </ul>

        </div>

        <!-- Profile -->
        <a href="/profile"
        data-title="Profile"
        id="profileLink"
        class="flex items-center gap-2 border border-blue-700 rounded-full px-4 py-2 bg-white shadow-sm hover:bg-blue-50 transition">
            <i class="fas fa-user-circle text-2xl text-gray-500"></i>
            <span class="font-medium text-blue-900">
                Profile
            </span>
        </a>
    </div>
</div>
