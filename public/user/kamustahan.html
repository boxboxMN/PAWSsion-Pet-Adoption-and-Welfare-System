<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kamustahan Update</title>

    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        *{
    box-sizing:border-box;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            margin:0;
            overscroll-behavior:none;
           visibility:hidden;

            }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        #sidebar,
        #header{
            visibility:hidden;
        }
    </style>
</head>

<body class="bg-gray-100 h-full overflow-hidden">

    <!-- ===== SIDEBAR ===== -->
    <div
        id="sidebar"
        class="fixed left-0 top-0 w-64 h-screen bg-white border-r border-gray-200 z-50">
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="ml-64 pt-24 h-screen overflow-hidden bg-gray-50">

        <!-- ===== HEADER ===== -->
      <div
        id="header"
        class="fixed top-0 left-64 right-0 h-24 bg-white border-b border-gray-200 z-40">
    </div>

        <!-- ===== KAMUSTAHAN UPDATE FORM ===== -->
        <div class="absolute top-24 left-64 right-0 bottom-0 overflow-y-auto p-8 bg-gray-50">
            <div class="max-w-6xl mx-auto">

                <!-- HEADER -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-gray-800">Kamustahan Update</h1>
                    <p class="text-gray-500 mt-2">Share updates about your adopted pet.</p>
                </div>

                <!-- TOP FIELDS -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- PET SELECT -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Select Adopted Pet
                        </label>
                        <select class="w-full border border-gray-300 rounded-lg px-4 py-3 bg-white">
                            <option>Charlie</option>
                            <option>Max</option>
                            <option>Luna</option>
                        </select>
                    </div>

                    <!-- DATE -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Date of Update
                        </label>
                        <div class="relative">
                            <input
                                type="date"
                                class="w-full border border-gray-300 rounded-lg px-4 py-3 bg-white"
                            />
                            <i class="fas fa-calendar-alt absolute right-4 top-4 text-gray-400"></i>
                        </div>
                    </div>

                </div>

                <!-- PET UPDATE (Textarea) -->
                <div class="mt-8">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Please share your pet's doing
                    </label>
                    <textarea
                        rows="4"
                        placeholder="Charlie is doing great! He's eating well, very active, and already loves playing in the backyard."
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 resize-none bg-white"
                    ></textarea>
                </div>

                <!-- PHOTO UPLOAD -->
                <div class="mt-8">
                    <label class="block text-sm font-medium text-gray-700 mb-3">
                        Upload photo - at least 1 photo
                    </label>

                    <div class="flex gap-4 flex-wrap">
                        <!-- ADD PHOTO -->
                        <label class="w-32 h-32 border border-gray-300 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition bg-white">
                            <i class="fas fa-image text-2xl text-gray-500 mb-2"></i>
                            <span class="text-sm text-gray-600">Add Photo</span>
                            <input type="file" class="hidden" />
                        </label>
                    </div>
                </div>

                <!-- REMINDER -->
                <div class="mt-8 bg-blue-50 border border-blue-100 rounded-lg p-4 flex gap-3">
                    <i class="fas fa-info-circle text-blue-600 mt-1"></i>
                    <div>
                        <h3 class="text-sm font-semibold text-blue-700">Reminder</h3>
                        <p class="text-sm text-gray-600 mt-1">
                            Please upload at least 1 photo of your pet.
                            Photos help us see how your pet is adjusting to their new home.
                        </p>
                    </div>
                </div>

                <!-- SUBMIT BUTTON -->
                <div class="mt-8">
                    <button class="w-full bg-blue-700 hover:bg-blue-800 text-white py-3 rounded-lg font-medium transition">
                        Submit
                    </button>
                </div>

            </div>
        </div>

    </main>

    <!-- ===== LOAD SIDEBAR & HEADER ===== -->
    <script>
        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) {
                    throw new Error(`Cannot load ${file}`);
                }
                document.getElementById(id).innerHTML = await response.text();
            } catch (error) {
                console.error(error);
            }
        }

       Promise.all([
    loadComponent("sidebar", "/user/userSidebar.html"),
    loadComponent("header", "/user/userHeader.html")
])
.then(() => {

    document.getElementById("sidebar").style.visibility = "visible";
    document.getElementById("header").style.visibility = "visible";

    const currentPath = window.location.pathname;
    const pageTitle = document.getElementById("pageTitle");

    const links = document.querySelectorAll("#sidebar .nav-link");

    links.forEach(link => {

        const href = link.getAttribute("href");

        const isActive =
            href === currentPath ||
            (href !== "/dashboard" && currentPath.startsWith(href));

        if (isActive) {

            link.className =
                "nav-link flex items-center gap-4 px-5 py-4 rounded-2xl bg-blue-600 text-white shadow";

            if (pageTitle) {
                pageTitle.textContent = link.dataset.title;
            }

        } else {

            link.className =
                "nav-link flex items-center gap-4 px-5 py-4 rounded-2xl text-gray-800 hover:bg-blue-50 hover:text-blue-600 transition";
        }
    });
    document.body.style.visibility = "visible";

})
.catch(error => console.error(error));
    </script>

</body>
</html>
