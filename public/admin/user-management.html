<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pawpon | User Management</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/user-management.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/adminSidebar.js"></script>
    <script src="../assets/js/adminTopbar.js"></script>
    <script src="../assets/js/adminUserManagement.js"></script>

</head>

<body class="h-screen overflow-hidden text-slate-800">
    <div class="flex h-full">

        <!-- Sidebar -->
        <div id="sidebar"></div>

        <!-- Main -->
        <main class="flex-1 p-3 overflow-hidden">
            <div class="glass h-full rounded-3xl shadow-2xl flex flex-col relative overflow-visible">

                <!-- HEADER -->
                <div id="topbar"></div>

                <!-- CONTENT -->
                <div class="flex-1 overflow-y-auto px-6 pb-6 pt-2 hide-scrollbar">

                    <!-- Search + count -->
                    <div class="search-wrap fadeIn">
                        <div class="relative flex-1">
                            <input
                            type="text"
                            id="searchInput"
                            class="search-input w-full"
                            placeholder="Search users..."
                            autocomplete="off"
                            />
                        </div>
                        <span class="search-count" id="userCount">0 users</span>
                    </div>

                    <!-- User Cards Grid -->
                    <div
                        id="userRowsContainer"
                        class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-3 fadeIn">
                    </div>

                </div>

            </div>
        </main>

    </div>

    <!-- Overlay -->
    <div class="panel-overlay" id="panelOverlay"></div>

    <!-- Detail Panel -->
    <div class="detail-panel" id="detailPanel">
        <div class="panel-header">
            <h3>User Details</h3>
            <button class="panel-close" id="panelClose">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="panel-body" id="panelBody">
            <!-- Rendered by JS -->
        </div>
    </div>

</body>
</html>
