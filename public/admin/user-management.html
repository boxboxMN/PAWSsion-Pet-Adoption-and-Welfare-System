href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

                            <!-- User Grid -->

                                            </p>

                                        </div>

                                    </div>

                                    <div class="mt-5 space-y-2 text-sm">

                                        <p>
                                            <i class="fa-solid fa-phone mr-2 text-slate-500"></i>
                                            09346463662
                                        </p>

                                        <p>
                                            <i class="fa-regular fa-envelope mr-2 text-slate-500"></i>
                                            mari@gmail.com
                                        </p>

                                        <span class="inline-flex px-3 py-1 rounded-full bg-green-100 text-green-700 text-xs font-semibold">
                                            Active
                                        </span>

                                    </div>

                                </div>
        </div>
      </div>

      <!-- Right Inspect Details Static Sidebar Component Drawer -->
      <aside class="w-[320px] bg-white border-l border-[#e2e8f0] py-8 px-6 flex flex-col overflow-y-auto relative shrink-0">
        <button class="absolute top-4 right-4 bg-none border-none text-[20px] text-black font-bold cursor-pointer">&times;</button>
        
        <div class="flex flex-col align-center items-center text-center mb-6">
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=120" alt="Maria Santos" class="w-20 h-20 rounded-full object-cover mb-3">

        <div class="flex flex-col gap-4 mb-8">
          <div class="grid grid-cols-[100px_1fr] text-xs items-baseline">
            <span class="text-[#64748b] font-medium">Phone</span>
            <span class="text-black font-semibold text-right [letter-spacing:0.2px]">09346463662</span>
          </div>
          <div class="grid grid-cols-[100px_1fr] text-xs items-baseline">

            <span class="text-black font-semibold text-right">May 30, 2026 10:30 A.M</span>
          </div>
          <div class="grid grid-cols-[100px_1fr] text-xs items-baseline">
            <span class="text-[#64748b] font-medium">Status</span>
            <span class="text-[#22c55e] font-bold text-right">Active</span>

        </div>

        <div>
          <h3 class="text-sm font-bold text-black mb-3">Account Actions</h3>

    </div>

<script>
// ==========================
// SIDEBAR DROPDOWN
// ==========================
document.addEventListener("DOMContentLoaded", () => {
    loadSidebar("user-management");

    loadTopbar({
        title: "User Management",
        subtitle: "Manage all users across the platform."
    });

    // Wait until the topbar is injected
    setTimeout(() => {
        const bellBtn = document.getElementById("notificationBellBtn");
        const wrapper = document.getElementById("notificationWrapper");

        if (bellBtn && wrapper) {
            bellBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                wrapper.classList.toggle("active");
            });

            document.addEventListener("click", (e) => {
                if (!wrapper.contains(e.target)) {
                    wrapper.classList.remove("active");
                }
            });
        }
    }, 100);
});
</script>
</body>
