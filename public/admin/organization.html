<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawpon | Organization Masterlist</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/adminSidebar.js"></script>
    <script src="../assets/js/adminTopbar.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background:
                radial-gradient(circle at top left, #dbeafe, transparent 35%),
                radial-gradient(circle at bottom right, #bfdbfe, transparent 30%),
                #f8fafc;
        }

        .glass {
            background: rgba(255, 255, 255, .65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, .5);
        }
        /* Hide scrollbar but keep scrolling */
        .hide-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;     /* Firefox */
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;             /* Chrome, Safari, Opera */
        }

        .fadeIn {
            animation: fade .25s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="h-screen overflow-hidden text-slate-800">
    <div class="flex h-full">

        <!-- Sidebar -->
        <div id="sidebar"></div>

        <!-- Main -->
        <main class="flex-1 p-3 overflow-hidden">
          <div class="glass h-full rounded-3xl shadow-2xl flex flex-col relative overflow-visible">

              <!-- HEADER -->
              <div id="topbar"></div>

              <!-- CONTENT -->
              <div class="flex-1 overflow-y-auto px-8 pb-8 pt-4 hide-scrollbar">

                    <!-- Search -->
                    <div class="relative max-w-xl mb-8">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>

                        <input
                            id="searchOrganization"
                            type="text"
                            placeholder="Search organization..."
                            class="w-full pl-12 pr-5 py-3 rounded-xl border border-slate-300 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- Cards -->
                    <div
                        id="organizationGrid"
                        class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                    </div>

                </div>
            </div>
        </main>

<!-- ========================================= -->
<!-- ORGANIZATION DETAILS DRAWER -->
<!-- ========================================= -->
<div
    id="detailsModal"
    class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-[9999] justify-end"
    onclick="closeDetailsModal(event)">

    <div
        class="w-full max-w-5xl h-full bg-slate-50 flex flex-col shadow-2xl"
        onclick="event.stopPropagation()">

        <!-- Header -->
        <div class="bg-white border-b border-slate-200 px-8 py-6 flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">
                    Organization Details
                </h2>

                <p class="text-slate-500 text-sm mt-1">
                    View organization information.
                </p>
            </div>

            <button
                onclick="closeDetailsModal()"
                class="w-10 h-10 rounded-xl hover:bg-slate-100 transition">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="flex-1 overflow-y-auto p-8">

            <!-- Profile -->
            <div class="bg-white rounded-3xl shadow border p-8 flex justify-between items-center">
                <div class="flex items-center gap-6">
                    <div class="w-24 h-24 rounded-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white flex items-center justify-center text-4xl">
                        <i class="fa-solid fa-building"></i>
                    </div>

                    <div>
                        <h2
                            id="detailName"
                            class="text-3xl font-bold">
                            -
                        </h2>

                        <p
                            id="detailType"
                            class="text-blue-600 mt-2">
                            -
                        </p>

                        <span
                            id="detailStatus"
                            class="inline-flex mt-4 px-4 py-1 rounded-full bg-green-100 text-green-700 text-sm font-semibold">
                            Approved
                        </span>
                    </div>
                </div>
            </div>

            <!-- Information -->
            <div class="grid lg:grid-cols-3 gap-6 mt-8">

                <!-- Left -->
                <div class="lg:col-span-2 space-y-6">

                    <!-- General -->
                    <div class="bg-white rounded-2xl shadow border p-6">
                        <h3 class="font-bold text-lg mb-5">
                            General Information
                        </h3>

                        <div class="grid md:grid-cols-2 gap-5">

                            <div>
                                <div class="bg-white border border-slate-200 rounded-2xl p-5">
                                    <h4 class="text-xs uppercase tracking-widest text-slate-400 font-semibold mb-5">
                                        Contact Person
                                    </h4>

                                    <div>
                                        <p class="text-[11px] uppercase tracking-wider text-slate-400">
                                            Representative
                                        </p>

                                        <p
                                            id="modalContactPerson"
                                            class="mt-1 text-sm font-semibold text-slate-800 break-words">
                                            N/A
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label class="text-xs uppercase text-slate-500">
                                    Email
                                </label>

                                <p
                                    id="detailEmail"
                                    class="mt-2 font-semibold">
                                    -
                                </p>
                            </div>

                            <div>
                                <label class="text-xs uppercase text-slate-500">
                                    Phone
                                </label>

                                <p
                                    id="detailPhone"
                                    class="mt-2 font-semibold">
                                    -
                                </p>
                            </div>

                            <div>
                                <label class="text-xs uppercase text-slate-500">
                                    Address
                                </label>

                                <p
                                    id="detailAddress"
                                    class="mt-2 font-semibold">
                                    -
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="bg-white rounded-2xl shadow border p-6">
                        <h3 class="font-bold text-lg mb-5">
                            Description
                        </h3>

                        <p
                            id="detailDescription"
                            class="leading-7 text-slate-600">
                            -
                        </p>
                    </div>

                </div>

                <!-- Right -->
                <div class="space-y-6">

                    <!-- Account -->
                    <div class="bg-white rounded-2xl shadow border p-6">
                        <h3 class="font-bold mb-5">
                            Account
                        </h3>

                        <div class="space-y-4">
                            <div>
                                <label class="text-xs uppercase text-slate-500">
                                    Verification
                                </label>

                                <p
                                    id="detailVerification"
                                    class="font-semibold mt-2">
                                    -
                                </p>
                            </div>

                            <div>
                                <label class="text-xs uppercase text-slate-500">
                                    Account Status
                                </label>

                                <p
                                    id="detailAccountStatus"
                                    class="font-semibold mt-2">
                                    -
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Documents -->
                    <div class="bg-white rounded-2xl shadow border p-6">
                        <h3 class="font-bold mb-5">
                            Uploaded Documents
                        </h3>

                        <div
                            id="documentsContainer"
                            class="space-y-3">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
</body>
<script>
  // ============================================
// INITIALIZE
// ============================================
let organizations = [];

document.addEventListener("DOMContentLoaded", () => {
    loadSidebar("organization-masterlist");
    loadTopbar({
    title: "Organization Masterlist",
    subtitle: "View and manage all approved organizations."
});
    loadOrganizations();
});

// ============================================
// LOAD ORGANIZATIONS
// ============================================
async function loadOrganizations() {
    try {
        const response = await fetch("/admin/organizations");
        if (!response.ok) {
            throw new Error("Unable to load organizations.");
        }

        organizations = await response.json();
        renderOrganizations(organizations);
    } catch (err) {
        console.error(err);
        document.getElementById("organizationGrid").innerHTML = `
            <div class="col-span-full">
                <div class="glass rounded-3xl p-16 text-center">
                    <i class="fa-solid fa-triangle-exclamation text-6xl text-red-500"></i>
                    <h2 class="text-2xl font-bold mt-6">Failed to Load Organizations</h2>
                    <p class="text-slate-500 mt-2">Please try again later.</p>
                </div>
            </div>
        `;
    }
}

// ============================================
// RENDER ORGANIZATION CARDS
// ============================================
function renderOrganizations(data) {
    const grid = document.getElementById("organizationGrid");

    if (data.length === 0) {
        grid.innerHTML = `
            <div class="col-span-full">
                <div class="glass rounded-3xl p-16 text-center">
                    <i class="fa-solid fa-building text-6xl text-blue-500"></i>
                    <h2 class="text-2xl font-bold mt-5">No Organizations Found</h2>
                </div>
            </div>
        `;
        return;
    }

    // Map and join for better DOM performance than appending innerHTML in a loop
    grid.innerHTML = data.map(org => `
        <div class="glass rounded-3xl shadow-lg hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 overflow-hidden">
            <div class="h-28 bg-gradient-to-r from-blue-600 to-indigo-600"></div>
            <div class="p-6 -mt-12">
                <div class="w-24 h-24 rounded-full bg-white border-4 border-white shadow flex items-center justify-center text-blue-600 text-4xl">
                    <i class="fa-solid fa-building"></i>
                </div>
                <h2 class="text-2xl font-bold mt-5">${org.organization_name}</h2>
                <p class="text-blue-600 mt-1">${org.organization_type}</p>
                <p class="text-slate-600 mt-5 line-clamp-3">${org.description || "No description provided."}</p>
                <div class="mt-6 space-y-2 text-sm">
                    <p><i class="fa-solid fa-envelope text-blue-600 mr-2"></i>${org.email}</p>
                    <p><i class="fa-solid fa-phone text-blue-600 mr-2"></i>${org.contact_number}</p>
                    <p><i class="fa-solid fa-location-dot text-blue-600 mr-2"></i>${org.address}</p>
                </div>
                <button onclick="openDetails(${org.organization_id})"
                    class="mt-6 w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-xl hover:from-blue-700 hover:to-indigo-700 transition">
                    View Details
                </button>
            </div>
        </div>
    `).join('');
}

// ============================================
// SEARCH
// ============================================
document.addEventListener("input", function(e) {
    if (e.target.id !== "searchOrganization") return;

    const keyword = e.target.value.toLowerCase();
    const filtered = organizations.filter(org => {
        return (
            org.organization_name.toLowerCase().includes(keyword) ||
            org.organization_type.toLowerCase().includes(keyword) ||
            org.email.toLowerCase().includes(keyword) ||
            org.contact_number.toLowerCase().includes(keyword) ||
            org.address.toLowerCase().includes(keyword)
        );
    });

    renderOrganizations(filtered);
});

// ============================================
// DETAILS DRAWER
// ============================================
function openDetails(id) {
    const org = organizations.find(o => o.organization_id == id);
    if (!org) return;

    document.getElementById("detailName").textContent = org.organization_name;
    document.getElementById("detailType").textContent = org.organization_type;
    document.getElementById("detailPerson").textContent = org.contact_person;
    document.getElementById("detailEmail").textContent = org.email;
    document.getElementById("detailPhone").textContent = org.contact_number;
    document.getElementById("detailAddress").textContent = `${org.address}, ${org.city}, ${org.province}`;
    document.getElementById("detailDescription").textContent = org.description || "No description provided.";
    document.getElementById("detailVerification").textContent = org.verification_status;
    document.getElementById("detailAccountStatus").textContent = org.status;

    loadDocuments(org);

    const modal = document.getElementById("detailsModal");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
    document.getElementById("modalContactPerson").textContent =
    org.contact_person ?? "N/A";
}

// ============================================
// DOCUMENTS
// ============================================
function loadDocuments(org) {
    const container = document.getElementById("documentsContainer");
    container.innerHTML = "";

    if (!org.document_name) {
        container.innerHTML = `<p class="text-slate-500 text-sm">No uploaded documents.</p>`;
        return;
    }

    container.innerHTML = `
        <div class="border rounded-xl p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-regular fa-file text-2xl text-blue-600"></i>
                <span>${org.document_name}</span>
            </div>
            <div class="flex gap-4 text-lg">
                <a href="/uploads/${org.file_path}" target="_blank">
                    <i class="fa-regular fa-eye"></i>
                </a>
                <a href="/uploads/${org.file_path}" download>
                    <i class="fa-solid fa-download"></i>
                </a>
            </div>
        </div>
    `;
}

// ============================================
// CLOSE DRAWER
// ============================================
function closeDetailsModal(event) {
    // Closes if triggered programmatically (no event passed) or if the backdrop wrapper is clicked
    if (!event || event.target.id === "detailsModal") {
        const modal = document.getElementById("detailsModal");
        modal.classList.remove("flex");
        modal.classList.add("hidden");
    }
}
</script>
</html>
