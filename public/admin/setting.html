<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pawpon | Settings</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/adminSidebar.js"></script>
    <script src="../assets/js/adminTopbar.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background:
                radial-gradient(circle at top left, #dbeafe, transparent 35%),
                radial-gradient(circle at bottom right, #bfdbfe, transparent 30%),
                #f8fafc;
        }

        .glass {
            background: rgba(255, 255, 255, .65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, .5);
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .fadeIn {
            animation: fade .25s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="h-screen overflow-hidden text-slate-800">
    <div class="flex h-full">

        <!-- Sidebar -->
        <div id="sidebar"></div>

        <!-- Main -->
        <main class="flex-1 p-3 overflow-hidden">
            <div class="glass h-full rounded-3xl shadow-2xl flex flex-col relative overflow-visible">

                <!-- HEADER -->
                <div id="topbar"></div>

                <!-- CONTENT — Empty, only the container remains -->
                <div class="flex-1 overflow-y-auto px-8 pb-8 pt-4 hide-scrollbar">
                    <!-- Content area intentionally left empty -->
                </div>

            </div>
        </main>

    </div>

    <script>
        // ==========================
        // SIDEBAR & TOPBAR
        // ==========================
        document.addEventListener("DOMContentLoaded", () => {
            loadSidebar("settings");
            loadTopbar({
                title: "Settings",
                subtitle: "Manage system settings, security policies, and configurations."
            });
        });
    </script>

</body>
</html>
