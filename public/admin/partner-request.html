<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawpon | Partner Requests</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/adminSidebar.js"></script>
    <script src="../assets/js/adminTopbar.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, #dbeafe, transparent 35%),
                radial-gradient(circle at bottom right, #bfdbfe, transparent 30%),
                #f8fafc;
        }

        /* Sidebar */
        .dropdown .dropdown-menu {
            display: none;
        }

        .dropdown.open .dropdown-menu {
            display: block;
        }

        .dropdown.open .fa-angle-down {
            transform: rotate(180deg);
        }

        /* Hide scrollbar but keep scrolling */
        .hide-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;     /* Firefox */
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;             /* Chrome, Safari, Opera */
        }

        /* Glass Card */
        .glass {
            background: rgba(255, 255, 255, .65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, .5);
        }

        /* Modal Animation */
        .fadeIn {
            animation: fade .25s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="h-screen overflow-hidden text-slate-800">

    <div class="flex h-full">

        <!-- SIDEBAR -->
        <div id="sidebar"></div>

        <!-- MAIN -->
        <main class="flex-1 p-3 overflow-hidden">
            <div class="glass h-full rounded-3xl shadow-2xl flex flex-col relative overflow-visible">
                
                <!-- HEADER -->
                <div id="topbar"></div>

                <!-- CONTENT -->
                <div class="flex-1 overflow-y-auto p-8 hide-scrollbar">
                    <div id="partnerGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                        <!-- Cards inserted here -->
                    </div>
                </div>

            </div>
        </main>

    </div>

    <!-- ========================================= -->
    <!-- ORGANIZATION DETAILS MODAL                -->
    <!-- ========================================= -->
    <div id="detailsModal" class="fixed inset-0 hidden items-center justify-center bg-black/50 backdrop-blur-sm z-50 p-3">
    <div class="bg-white w-full max-w-6xl max-h-[97vh] rounded-2xl shadow-2xl overflow-hidden">

        <div class="bg-white border-b px-7 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 flex items-center justify-center text-white text-2xl shadow-lg">
                    <i class="fa-solid fa-building"></i>
                </div>
                <div>
                    <h2 id="modalName" class="text-2xl font-bold text-slate-900"></h2>
                    <div class="flex items-center gap-3 mt-2">
                        <span id="modalType" class="text-blue-600 font-semibold"></span>
                        <span class="w-1 h-1 rounded-full bg-slate-300"></span>
                        <span class="bg-yellow-100 text-yellow-700 text-xs font-semibold px-3 py-1 rounded-full">
                            Pending Review
                        </span>
                    </div>
                </div>
            </div>
            <button onclick="closeModal()" class="w-11 h-11 rounded-xl hover:bg-slate-100 transition">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
            <div class="p-3 bg-slate-50/50">

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">

        <!-- ===================== -->
        <!-- Organization Type -->
        <!-- ===================== -->
        <div class="bg-white border border-slate-100 rounded-3xl p-5 shadow-sm">
            <span class="text-xs uppercase tracking-wider text-slate-400 font-bold">
                Organization Type
            </span>

            <h3 id="modalType2" class="text-2xl font-black text-slate-900 mt-1"></h3>

            <div class="mt-6 flex items-center justify-between border-t border-slate-100 pt-4">

                <div>
                    <p class="text-xs text-slate-400 uppercase font-medium">
                        Date Submitted
                    </p>

                    <p id="modalCreated" class="font-bold text-slate-700 mt-0.5"></p>
                </div>

                <div class="text-right">
                    <p class="text-xs text-slate-400 uppercase font-medium mb-1">
                        Current Lifecycle
                    </p>

                    <span id="modalStatus"
                        class="inline-flex px-4 py-1.5 rounded-full text-xs font-bold tracking-wide">
                        Pending
                    </span>
                </div>

            </div>
        </div>

        <!-- ===================== -->
        <!-- Direct Contacts -->
        <!-- ===================== -->
        <div class="bg-white border border-slate-100 rounded-3xl p-5 shadow-sm space-y-4">

            <span class="text-xs uppercase tracking-wider text-slate-400 font-bold">
                Direct Contacts
            </span>

            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center">
                    <i class="fa-solid fa-user"></i>
                </div>

                <div>
                    <p class="text-[11px] uppercase text-slate-400">
                        Contact Person
                    </p>

                    <p id="modalContactPerson"
                        class="text-sm font-semibold text-slate-700">
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center">
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div>
                    <p class="text-[11px] uppercase text-slate-400">
                        Email
                    </p>

                    <p id="modalEmail"
                        class="text-sm font-semibold text-slate-700">
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center">
                    <i class="fa-solid fa-phone"></i>
                </div>

                <div>
                    <p class="text-[11px] uppercase text-slate-400">
                        Contact Number
                    </p>

                    <p id="modalPhone"
                        class="text-sm font-semibold text-slate-700">
                    </p>
                </div>
            </div>

        </div>

        <!-- ===================== -->
        <!-- Headquarters -->
        <!-- ===================== -->
        <div class="bg-white border border-slate-100 rounded-3xl p-5 shadow-sm">

            <span class="text-xs uppercase tracking-wider text-slate-400 font-bold">
                Headquarters Location
            </span>

            <div class="flex gap-3 mt-4">

                <div class="w-10 h-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center">
                    <i class="fa-solid fa-location-dot"></i>
                </div>

                <div>

                    <p class="text-[11px] uppercase text-slate-400">
                        Registered Address
                    </p>

                    <div id="modalAddress"
                        class="text-sm font-semibold text-slate-700 mt-1 leading-relaxed">
                    </div>

                </div>

            </div>

        </div>

        <!-- ===================== -->
        <!-- Organization Profile -->
        <!-- ===================== -->
        <div class="lg:col-span-2 bg-white border border-slate-100 rounded-3xl p-5 shadow-sm">

            <div class="flex items-center gap-2 mb-4">

                <div class="w-1.5 h-4 bg-indigo-600 rounded-full"></div>

                <h4 class="font-bold text-slate-900">
                    Organization Profile & Summary
                </h4>

            </div>

            <p id="modalDescription"
                class="text-sm leading-7 text-slate-600 font-medium bg-slate-50 rounded-2xl p-4 border">
            </p>

        </div>

        <!-- ===================== -->
        <!-- Documents -->
        <!-- ===================== -->
        <div class="bg-white border border-slate-100 rounded-3xl p-5 shadow-sm">

            <div class="flex items-center justify-between mb-4">

                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-4 bg-blue-600 rounded-full"></div>

                    <h4 class="font-bold text-slate-900">
                        Legal Verification Documents
                    </h4>
                </div>

            </div>

            <div id="modalDocuments" class="flex flex-col gap-3">

                <div class="text-slate-400 text-sm italic">
                    No uploaded documents.
                </div>

            </div>

        </div>

    </div>

       <div class="sticky bottom-0 bg-white px-10 py-6 flex justify-end gap-4">
            <button onclick="closeModal()" class="px-6 py-2 rounded-xl border border-slate-300 hover:bg-slate-100 transition">
                Close
            </button>
            <button id="approveBtn" class="px-6 py-2 rounded-xl bg-green-600 hover:bg-green-700 text-white font-semibold">
                <i class="fa-solid fa-check mr-2"></i> Approve
            </button>
            <button id="rejectBtn" class="px-6 py-2 rounded-xl bg-red-600 hover:bg-red-700 text-white font-semibold">
                <i class="fa-solid fa-xmark mr-2"></i> Reject
            </button>
        </div>

    </div>
</div>

</body>
<script>
// ==========================
// SIDEBAR AND TOPBAR
// ==========================
document.addEventListener("DOMContentLoaded", () => {
    loadSidebar("partner-request");

    loadTopbar({
        title: "Partner Requests",
        subtitle: "Review pending organizations requesting partnership."
    });
});

// ==========================
// MODAL
// ==========================

const modal = document.getElementById("detailsModal");

async function viewDetails(org) {
    try {
        const res = await fetch(`/admin/organization/${org.organization_id}`);

        if (!res.ok) {
            throw new Error("Unable to load organization.");
        }

        const data = await res.json();

        // ===============================
        // BASIC INFORMATION
        // ===============================

        document.getElementById("modalName").textContent = data.organization_name || "N/A";
        document.getElementById("modalType").textContent = data.organization_type || "N/A";
        document.getElementById("modalType2").textContent = data.organization_type || "N/A";
        document.getElementById("modalContactPerson").textContent =
        data.contact_person || "N/A";
        document.getElementById("modalEmail").innerHTML = `
            ${data.email ?? "N/A"}
        `;

        document.getElementById("modalPhone").innerHTML = `
            ${data.contact_number ?? "N/A"}
        `;

        document.getElementById("modalAddress").innerHTML = `
            <div>
                ${data.address || ""}
                <br>
                <span class="text-slate-500">
                    ${data.city || ""} ${data.province || ""}
                </span>
            </div>
        `;

        document.getElementById("modalDescription").textContent = data.description || "No description provided.";

        // ===============================
        // STATUS
        // ===============================

        const status = document.getElementById("modalStatus");
        status.textContent = data.verification_status;

        if (data.verification_status === "Approved") {
            status.className = "inline-flex mt-3 px-4 py-2 rounded-full bg-green-100 text-green-700 text-sm font-semibold";
        } else if (data.verification_status === "Rejected") {
            status.className = "inline-flex mt-3 px-4 py-2 rounded-full bg-red-100 text-red-700 text-sm font-semibold";
        } else {
            status.className = "inline-flex mt-3 px-4 py-2 rounded-full bg-yellow-100 text-yellow-700 text-sm font-semibold";
        }

        // ===============================
        // DATE
        // ===============================

        document.getElementById("modalCreated").textContent = new Date(data.created_at).toLocaleDateString("en-US", {
            year: "numeric",
            month: "long",
            day: "numeric"
        });

        // ===============================
        // DOCUMENTS
        // ===============================

        const docs = document.getElementById("modalDocuments");
        docs.innerHTML = "";

        if (!data.documents || data.documents.length === 0) {
            docs.innerHTML = `
                <p class="text-slate-400">No uploaded documents.</p>
            `;
        } else {
            docs.innerHTML = data.documents.map(doc => `
                <div class="flex items-center justify-between border rounded-xl p-3 hover:bg-slate-50">
                    <div class="flex items-center gap-4">
                        <div class="w-11 h-11 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center">
                            <i class="fa-solid fa-file"></i>
                        </div>
                        <div>
                            <p class="font-semibold">${doc.document_name}</p>
                            <p class="text-xs text-slate-500">
                                Uploaded ${new Date(doc.uploaded_at).toLocaleDateString()}
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <a href="/admin/document/view/${doc.document_id}" target="_blank" class="px-3 py-2 rounded-lg border hover:bg-slate-100">
                            <i class="fa-solid fa-eye"></i>
                        </a>
                        <a href="/admin/document/download/${doc.document_id}" class="px-3 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">
                            <i class="fa-solid fa-download"></i>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // ===============================
        // APPROVE BUTTON
        // ===============================

        document.getElementById("approveBtn").onclick = async () => {
            if (!confirm("Approve this organization?")) return;

            await fetch(`/admin/approve/${data.organization_id}`, {
                method: "PUT"
            });

            closeModal();
            loadRequests();
        };

        // ===============================
        // REJECT BUTTON
        // ===============================

        document.getElementById("rejectBtn").onclick = async () => {
            if (!confirm("Reject this organization?")) return;

            await fetch(`/admin/reject/${data.organization_id}`, {
                method: "PUT"
            });

            closeModal();
            loadRequests();
        };

        modal.classList.remove("hidden");
        modal.classList.add("flex");

    } catch (err) {
        console.error(err);
        alert("Unable to load organization.");
    }
}

function closeModal() {
    modal.classList.remove("flex");
    modal.classList.add("hidden");
}

modal.addEventListener("click", e => {
    if (e.target === modal) {
        closeModal();
    }
});

document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
        closeModal();
    }
});
// ==========================
// LOAD ORGANIZATIONS
// ==========================
async function loadRequests() {
    try {
        const res = await fetch("/admin/partner-requests");
        if (!res.ok) {
            throw new Error("Failed to load requests.");
        }

        const organizations = await res.json();
        const grid = document.getElementById("partnerGrid");

        // Empty State
        if (!organizations.length) {
            grid.innerHTML = `
                <div class="col-span-full">
                    <div class="glass rounded-3xl p-16 text-center">
                        <i class="fa-solid fa-circle-check text-6xl text-green-500"></i>
                        <h2 class="text-2xl font-bold mt-5">No Pending Requests</h2>
                        <p class="text-slate-500 mt-3">All organization applications have already been reviewed.</p>
                    </div>
                </div>
            `;
            return;
        }

        grid.innerHTML = "";
        organizations.forEach(org => {
    grid.innerHTML += `
    <div class="group bg-white border border-slate-200 rounded-3xl overflow-hidden hover:border-blue-200 hover:shadow-2xl hover:-translate-y-1 transition-all duration-300">
        <div class="h-2 bg-gradient-to-r from-blue-600 via-indigo-500 to-cyan-400"></div>

        <div class="p-7">
            <div class="flex justify-between items-start">
                <div class="flex gap-4">
                    <div class="w-16 h-16 rounded-2xl bg-blue-100 text-blue-600 flex items-center justify-center text-2xl group-hover:scale-105 transition">
                        <i class="fa-solid fa-building"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-slate-900 leading-tight">${org.organization_name}</h2>
                        <p class="text-blue-600 font-medium mt-1">${org.organization_type}</p>
                    </div>
                </div>
                <span class="bg-yellow-100 text-yellow-700 text-xs font-semibold px-3 py-1 rounded-full">Pending</span>
            </div>

            <div class="border-t my-6"></div>

            <div class="space-y-4 text-sm">
                <div class="flex gap-3 items-start">
                    <div class="w-9 h-9 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-xs uppercase text-slate-400">Email</p>
                        <p class="font-medium text-slate-700 break-all">${org.email}</p>
                    </div>
                </div>
                <div class="flex gap-3 items-start">
                    <div class="w-9 h-9 rounded-xl bg-green-50 flex items-center justify-center text-green-600">
                        <i class="fa-solid fa-phone"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-xs uppercase text-slate-400">Phone</p>
                        <p class="font-medium text-slate-700">${org.contact_number}</p>
                    </div>
                </div>
                <div class="flex gap-3 items-start">
                    <div class="w-9 h-9 rounded-xl bg-red-50 flex items-center justify-center text-red-500">
                        <i class="fa-solid fa-location-dot"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-xs uppercase text-slate-400">Location</p>
                        <p class="font-medium text-slate-700 line-clamp-2">${org.address}</p>
                    </div>
                </div>
            </div>

            <div class="mt-6 bg-slate-50 rounded-2xl p-3">
                <p class="text-xs uppercase tracking-wide text-slate-400 mb-2">Description</p>
                <p class="text-sm leading-6 text-slate-600 line-clamp-3">${org.description || "No description provided."}</p>
            </div>

            <div class="mt-7 flex items-center justify-between">
                <div>
                    <p class="text-xs text-slate-400">Submitted</p>
                    <p class="font-semibold text-slate-700">${new Date(org.created_at).toLocaleDateString()}</p>
                </div>
                <button onclick='viewDetails(${JSON.stringify(org)})' class="px-5 py-3 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold hover:shadow-lg hover:scale-105 active:scale-95 transition">
                    <i class="fa-solid fa-eye mr-2"></i> View Details
                </button>
            </div>
        </div>
    </div>
    `;
});
    } catch (err) {
        console.error(err);
        document.getElementById("partnerGrid").innerHTML = `
            <div class="col-span-full">
                <div class="glass rounded-3xl p-16 text-center">
                    <i class="fa-solid fa-triangle-exclamation text-6xl text-red-500"></i>
                    <h2 class="text-2xl font-bold mt-5">Unable to Load Requests</h2>
                    <p class="text-slate-500 mt-3">Please try again later.</p>
                </div>
            </div>
        `;
    }
}

// ==========================
// INITIAL LOAD
// ==========================
loadRequests();
</script>
</html>
