<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawpon | Partner Requests</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/adminSidebar.js"></script>
    <script src="../assets/js/adminTopbar.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, #dbeafe, transparent 35%),
                radial-gradient(circle at bottom right, #bfdbfe, transparent 30%),
                #f8fafc;
        }

        /* Sidebar */
        .dropdown .dropdown-menu {
            display: none;
        }

        .dropdown.open .dropdown-menu {
            display: block;
        }

        .dropdown.open .fa-angle-down {
            transform: rotate(180deg);
        }

        /* Notifications
        .notification-container .notification-dropdown {
            display: none;
        }

        .notification-container.active .notification-dropdown {
            display: block;
        } */

        /* Glass Card */
        .glass {
            background: rgba(255, 255, 255, .65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, .5);
        }

        /* Modal Animation */
        .fadeIn {
            animation: fade .25s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="h-screen overflow-hidden text-slate-800">

    <div class="flex h-full">

        <!-- SIDEBAR -->
        <div id="sidebar"></div>

        <!-- MAIN -->
        <main class="flex-1 p-5 overflow-hidden">
            <div class="glass h-full rounded-3xl shadow-2xl flex flex-col relative overflow-visible">
                
                <!-- HEADER -->
                <div id="topbar"></div>

                <!-- CONTENT -->
                <div class="flex-1 overflow-y-auto p-8">
                    <div id="partnerGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                        <!-- Cards inserted here -->
                    </div>
                </div>

            </div>
        </main>

    </div>

    <!-- ========================================= -->
    <!-- ORGANIZATION DETAILS MODAL                -->
    <!-- ========================================= -->
    <div id="detailsModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-6">
        <div class="glass fadeIn w-full max-w-3xl rounded-3xl shadow-2xl overflow-hidden">
            
            <!-- Header -->
            <div class="flex justify-between items-center px-8 py-6 border-b">
                <div>
                    <h2 class="text-2xl font-bold">Organization Details</h2>
                    <p class="text-slate-500 text-sm mt-1">Review the submitted partner application.</p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full hover:bg-slate-200 transition">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <!-- Body -->
            <div class="p-8 space-y-8">
                <!-- Organization Name -->
                <div class="text-center">
                    <div class="w-24 h-24 rounded-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white flex items-center justify-center mx-auto text-4xl shadow-lg">
                        <i class="fa-solid fa-building"></i>
                    </div>
                    <h2 id="modalName" class="text-3xl font-bold mt-5"></h2>
                    <span class="inline-flex mt-3 bg-yellow-100 text-yellow-700 px-4 py-1 rounded-full text-sm font-semibold">
                        Pending Review
                    </span>
                </div>

                <!-- Information Grid -->
                <div class="grid md:grid-cols-2 gap-5">
                    <div class="glass rounded-2xl p-5">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Organization Type</p>
                        <p id="modalType" class="mt-2 font-semibold text-lg"></p>
                    </div>
                    <div class="glass rounded-2xl p-5">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Email Address</p>
                        <p id="modalEmail" class="mt-2 font-semibold"></p>
                    </div>
                    <div class="glass rounded-2xl p-5">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Contact Number</p>
                        <p id="modalPhone" class="mt-2 font-semibold"></p>
                    </div>
                    <div class="glass rounded-2xl p-5">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Address</p>
                        <p id="modalAddress" class="mt-2 font-semibold"></p>
                    </div>
                </div>

                <!-- Description -->
                <div class="glass rounded-2xl p-6">
                    <p class="text-xs uppercase tracking-wide text-slate-500 mb-3">Organization Description</p>
                    <p id="modalDescription" class="leading-7 text-slate-700"></p>
                </div>
            </div>

            <!-- Footer -->
            <div class="border-t px-8 py-5 flex justify-end gap-4">
                <button onclick="closeModal()" class="px-6 py-3 rounded-xl border border-slate-300 hover:bg-slate-100 transition">
                    Close
                </button>
            </div>

        </div>
    </div>

</body>
<script>
// ==========================
// SIDEBAR AND TOPBAR
// ==========================
document.addEventListener("DOMContentLoaded", () => {
    loadSidebar("partner-request");

    loadTopbar({
        title: "Partner Requests",
        subtitle: "Review pending organizations requesting partnership."
    });
});

// ==========================
// MODAL
// ==========================
const modal = document.getElementById("detailsModal");

function viewDetails(org) {
    document.getElementById("modalName").textContent = org.organization_name || "N/A";
    document.getElementById("modalType").textContent = org.organization_type || "N/A";
    document.getElementById("modalEmail").textContent = org.email || "N/A";
    document.getElementById("modalPhone").textContent = org.contact_number || "N/A";
    document.getElementById("modalAddress").textContent = org.address || "N/A";
    document.getElementById("modalDescription").textContent = org.description || "No description provided.";

    modal.classList.remove("hidden");
    modal.classList.add("flex");
}

function closeModal() {
    modal.classList.remove("flex");
    modal.classList.add("hidden");
}

// Close when clicking outside
modal.addEventListener("click", function(e) {
    if (e.target === modal) {
        closeModal();
    }
});

// Close with ESC
document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        closeModal();
    }
});

// ==========================
// LOAD ORGANIZATIONS
// ==========================
async function loadRequests() {
    try {
        const res = await fetch("/admin/partner-requests");
        if (!res.ok) {
            throw new Error("Failed to load requests.");
        }

        const organizations = await res.json();
        const grid = document.getElementById("partnerGrid");

        // Empty State
        if (!organizations.length) {
            grid.innerHTML = `
                <div class="col-span-full">
                    <div class="glass rounded-3xl p-16 text-center">
                        <i class="fa-solid fa-circle-check text-6xl text-green-500"></i>
                        <h2 class="text-2xl font-bold mt-5">No Pending Requests</h2>
                        <p class="text-slate-500 mt-3">All organization applications have already been reviewed.</p>
                    </div>
                </div>
            `;
            return;
        }

        grid.innerHTML = "";
        organizations.forEach(org => {
            grid.innerHTML += `
                <div class="glass rounded-3xl shadow-lg hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 overflow-hidden">
                    <div class="p-7">
                        <div class="flex justify-between items-start">
                            <div>
                                <h2 class="text-xl font-bold text-slate-800">${org.organization_name}</h2>
                                <p class="text-blue-600 mt-1">${org.organization_type}</p>
                            </div>
                            <span class="bg-yellow-100 text-yellow-700 text-xs px-4 py-1 rounded-full font-semibold">Pending</span>
                        </div>
                        <p class="text-slate-500 mt-6 line-clamp-3">${org.description || "No description provided."}</p>
                        <button onclick='viewDetails(${JSON.stringify(org)})' class="mt-8 w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white py-3 rounded-xl font-semibold transition">
                            <i class="fa-solid fa-eye mr-2"></i> View Details
                        </button>
                    </div>
                </div>
            `;
        });
    } catch (err) {
        console.error(err);
        document.getElementById("partnerGrid").innerHTML = `
            <div class="col-span-full">
                <div class="glass rounded-3xl p-16 text-center">
                    <i class="fa-solid fa-triangle-exclamation text-6xl text-red-500"></i>
                    <h2 class="text-2xl font-bold mt-5">Unable to Load Requests</h2>
                    <p class="text-slate-500 mt-3">Please try again later.</p>
                </div>
            </div>
        `;
    }
}

// ==========================
// INITIAL LOAD
// ==========================
loadRequests();
</script>
</html>
