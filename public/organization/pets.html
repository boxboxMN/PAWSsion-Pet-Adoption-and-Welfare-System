<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <script src="../assets/js/orgPets.js" defer></script>
    <script src="../assets/js/orgTopbar.js"></script>
    <script src="../assets/js/orgSidebar.js"></script>
</head>
<body class="bg-slate-100 font-['Inter',sans-serif] min-h-screen">

<div id="headerContainer"></div>
<div id="sidebarContainer"></div>

<main id="mainContent" class="pt-28 pb-12 px-4 md:px-8 transition-all duration-200 ease-in-out md:ml-[280px] data-[sidebar-collapsed=true]:md:ml-20">
    <!-- Toolbar -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
        <div class="flex flex-wrap items-center gap-3">
            <!-- Search -->
            <div class="relative flex-1 min-w-[250px]">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input id="searchPet" type="text" placeholder="Search pet..." class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-blue-600">
            </div>

            <!-- Status -->
            <select id="statusFilter" class="px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-600">
                <option value="">All Status</option>
                <option>Available</option>
                <option>Pending</option>
                <option>Adopted</option>
                <option>Archived</option>
            </select>

            <!-- Species -->
            <select id="typeFilter" class="px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-600">
                <option value="">All Species</option>
                <option>Dog</option>
                <option>Cat</option>
            </select>

            <button id="addPetBtn" class="bg-blue-700 hover:bg-blue-800 text-white px-5 py-2.5 rounded-xl flex items-center gap-2">
                <i class="fa-solid fa-plus"></i>
                Add Pet
            </button>
        </div>
    </div>

    <!-- PETS -->
    <div id="petsContainer" class="mt-6"></div>
</main>

<!-- ========================= -->
<!-- ADD PET MODAL -->
<!-- ========================= -->
<div id="petModal" class="fixed inset-0 hidden items-center justify-center bg-black/50 z-50 p-5">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-5xl max-h-[95vh] overflow-y-auto">
        <div class="border-b px-8 py-5 flex items-center justify-between">
            <h2 class="text-2xl font-bold text-slate-800">
                <i class="fa-solid fa-paw text-blue-700 mr-2"></i>
                Add New Pet
            </h2>
            <button id="closePetModal" class="text-2xl text-slate-500 hover:text-red-600">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <form id="petForm" enctype="multipart/form-data" class="p-8">
            <input type="hidden" name="organization_id" id="organization_id">

            <!-- BASIC INFORMATION -->
            <div class="mb-8">
                <h3 class="text-lg font-semibold text-blue-700 mb-4">Basic Information</h3>
                <div class="grid md:grid-cols-2 gap-5">
                    <!-- NAME -->
                    <div>
                        <label class="block text-sm font-medium mb-1">
                            Pet Name <span class="text-red-500">*</span>
                        </label>
                        <input type="text" name="name" maxlength="100" required placeholder="Enter pet name" class="w-full rounded-lg border p-2.5">
                    </div>

                    <!-- SPECIES -->
                    <div>
                        <label class="block text-sm font-medium mb-1">
                            Species <span class="text-red-500">*</span>
                        </label>
                        <select name="species" required class="w-full rounded-lg border p-2.5">
                            <option value="" selected disabled>Select species</option>
                            <option value="Dog">Dog</option>
                            <option value="Cat">Cat</option>
                        </select>
                    </div>

                    <!-- GENDER -->
                    <div>
                        <label class="block text-sm font-medium mb-1">
                            Gender <span class="text-red-500">*</span>
                        </label>
                        <select name="gender" required class="w-full rounded-lg border p-2.5">
                            <option value="" selected disabled>Select gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                    <!-- AGE -->
                    <div>
                        <label class="block text-sm font-medium mb-1">
                            Age Group <span class="text-red-500">*</span>
                        </label>
                        <select name="age" required class="w-full rounded-lg border p-2.5">
                            <option value="" selected disabled>Select age group</option>
                            <option value="Puppy/Kitten (0-1 yr old)">Puppy / Kitten (0-1 yr old)</option>
                            <option value="Adolescence (2-3 yrs old)">Adolescence (2-3 yrs old)</option>
                            <option value="Adult (4-7 yrs old)">Adult (4-7 yrs old)</option>
                            <option value="Senior (8-10 yrs old)">Senior (8-10 yrs old)</option>
                        </select>
                    </div>

                    <!-- BIRTH DATE -->
                    <div>
                        <label class="block text-sm font-medium mb-1">Birth Date</label>
                        <input type="date" name="birth_date" class="w-full rounded-lg border p-2.5">
                    </div>

                    <!-- COLOR -->
                    <div>
                        <label class="block text-sm font-medium mb-1">Color</label>
                        <input type="text" name="color" maxlength="100" placeholder="Ex. Brown and White" class="w-full rounded-lg border p-2.5">
                    </div>
                </div>
            </div>

            <!-- HEALTH -->
            <div class="mb-8">
                <h3 class="text-lg font-semibold text-blue-700 mb-4">Health Information</h3>
                <div class="grid md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium mb-1">Health Status</label>
                        <select name="health_status" class="w-full rounded-lg border p-2.5">
                            <option value="Healthy">Healthy</option>
                            <option value="Sick">Sick</option>
                            <option value="Under Treatment">Under Treatment</option>
                            <option value="Recovered">Recovered</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Vaccination Status</label>
                        <select name="vaccination_status" class="w-full rounded-lg border p-2.5">
                            <option value="Vaccinated">Vaccinated</option>
                            <option value="Not Vaccinated">Not Vaccinated</option>
                            <option value="Unknown">Unknown</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- ADOPTION -->
            <div class="mb-8">
                <h3 class="text-lg font-semibold text-blue-700 mb-4">Adoption Information</h3>
                <div class="grid md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium mb-1">Adoption Status</label>
                        <select name="adoption_status" class="w-full rounded-lg border p-2.5">
                            <option value="Available">Available</option>
                            <option value="Pending">Pending</option>
                            <option value="Adopted">Adopted</option>
                            <option value="Archived">Archived</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Pet Image</label>
                        <input type="file" name="image" accept=".jpg,.jpeg,.png,.webp" class="w-full rounded-lg border p-2.5">
                    </div>
                </div>
            </div>

            <!-- DESCRIPTION -->
            <div>
                <label class="block text-sm font-medium mb-1">Behavior Description</label>
                <textarea name="behavior_description" rows="5" maxlength="1000" placeholder="Describe the pet's personality, friendliness, behavior, and special notes..." class="w-full rounded-lg border p-3 resize-none"></textarea>
            </div>

            <!-- BUTTONS -->
            <div class="flex justify-end gap-3 mt-8">
                <button type="button" id="cancelPetBtn" class="px-6 py-2.5 rounded-lg border border-slate-300 hover:bg-slate-100">Cancel</button>
                <button type="submit" class="bg-blue-700 hover:bg-blue-800 text-white px-8 py-2.5 rounded-lg">
                    <i class="fa-solid fa-floppy-disk mr-2"></i>
                    Save Pet
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
