<style>
    ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
    }
    ::-webkit-scrollbar-track {
        background: #eef2f6;
    }
    ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 8px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
    }
</style>

<button id="mobileToggle" class="fixed top-4 left-4 z-50 p-2.5 rounded-xl bg-white border border-gray-200 text-blue-700 hover:bg-blue-50 transition shadow-sm md:hidden" aria-label="Toggle sidebar">
    <i class="fa-solid fa-bars"></i>
</button>

<div id="sidebarOverlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden data-[mobile-open=true]:block md:hidden"></div>

<aside id="sidebar"
    data-collapsed="false"
    data-mobile-open="false"
    class="fixed top-0 left-0 h-screen w-[280px] bg-white border-r border-gray-200 flex flex-col justify-between z-50 transition-all duration-200 ease-in-out data-[collapsed=true]:w-20 -translate-x-full data-[mobile-open=true]:translate-x-0 md:translate-x-0 shadow-sm">

    <div>
        <div class="flex items-center justify-between px-5 pt-6 data-[collapsed=true]:justify-center" id="logoContainer">
            <div class="flex items-center gap-3">
                <img src="https://placehold.co/44x44/eef2ff/1e3a8a?text=🐾" alt="Pawpon Logo" class="w-11 h-11 object-contain rounded-xl bg-blue-50 p-2">
                <div class="sidebar-text">
                    <h1 class="text-xl font-bold text-blue-900 leading-none tracking-tight">Pawpon</h1>
                    <p class="text-[11px] font-medium text-gray-400 mt-1 uppercase tracking-wider">Org Portal</p>
                </div>
            </div>
            <button id="collapseBtn" class="p-1.5 rounded-lg text-gray-400 hover:text-blue-900 hover:bg-gray-100 transition">
                <i class="fa-solid fa-angles-left transition-transform duration-200" id="collapseIcon"></i>
            </button>
        </div>

        <div class="px-4 mt-8">
            <p class="sidebar-text text-[11px] uppercase tracking-wider text-gray-400 font-bold mb-2 px-2">Main Menu</p>
            <a href="/org/dashboard" class="nav-link flex items-center gap-4 h-11 px-3 rounded-xl text-gray-600 hover:bg-blue-50/50 hover:text-blue-900 transition font-medium group">
                <i class="fa-solid fa-table-cells-large w-5 text-center text-lg text-gray-400 group-hover:text-blue-900 transition-colors"></i>
                <span class="sidebar-text whitespace-nowrap">Dashboard</span>
            </a>
        </div>

        <div class="px-4 mt-6">
            <p class="sidebar-text text-[11px] uppercase tracking-wider text-gray-400 font-bold mb-2 px-2">Management</p>
            <div class="flex flex-col gap-1">
                <a href="/org/pets" class="nav-link flex items-center gap-4 h-11 px-3 rounded-xl text-gray-600 hover:bg-blue-50/50 hover:text-blue-900 transition font-medium group">
                    <i class="fa-solid fa-paw w-5 text-center text-gray-400 group-hover:text-blue-900 transition-colors"></i>
                    <span class="sidebar-text whitespace-nowrap">Pets</span>
                </a>
                <a href="/org/adoption" class="nav-link flex items-center gap-4 h-11 px-3 rounded-xl text-gray-600 hover:bg-blue-50/50 hover:text-blue-900 transition font-medium group">
                    <i class="fa-solid fa-hand-holding-heart w-5 text-center text-gray-400 group-hover:text-blue-900 transition-colors"></i>
                    <span class="sidebar-text whitespace-nowrap">Adoption</span>
                </a>
                <a href="/org/donation" class="nav-link flex items-center gap-4 h-11 px-3 rounded-xl text-gray-600 hover:bg-blue-50/50 hover:text-blue-900 transition font-medium group">
                    <i class="fa-solid fa-hand-holding-dollar w-5 text-center text-gray-400 group-hover:text-blue-900 transition-colors"></i>
                    <span class="sidebar-text whitespace-nowrap">Donation</span>
                </a>
            </div>
        </div>

        <div class="px-4 mt-6">
            <p class="sidebar-text text-[11px] uppercase tracking-wider text-gray-400 font-bold mb-2 px-2">Data &amp; Reports</p>
            <div class="flex flex-col gap-1">
                <a href="/org/kamustahan" class="nav-link flex items-center gap-4 h-11 px-3 rounded-xl text-gray-600 hover:bg-blue-50/50 hover:text-blue-900 transition font-medium group">
                    <i class="fa-solid fa-earth-asia w-5 text-center text-gray-400 group-hover:text-blue-900 transition-colors"></i>
                    <span class="sidebar-text whitespace-nowrap">Kamustahan</span>
                </a>
                <a href="/org/analytics" class="nav-link flex items-center gap-4 h-11 px-3 rounded-xl text-gray-600 hover:bg-blue-50/50 hover:text-blue-900 transition font-medium group">
                    <i class="fa-solid fa-chart-simple w-5 text-center text-gray-400 group-hover:text-blue-900 transition-colors"></i>
                    <span class="sidebar-text whitespace-nowrap">Analytics</span>
                </a>
            </div>
        </div>
    </div>

    <div class="border-t border-gray-100 p-4 flex flex-col gap-1">
        <a href="/org/settings" class="nav-link flex items-center gap-4 h-11 px-3 rounded-xl text-gray-600 hover:bg-gray-50 transition font-medium group">
            <i class="fa-solid fa-gear w-5 text-center text-gray-400 group-hover:text-blue-900 transition-colors"></i>
            <span class="sidebar-text whitespace-nowrap">Settings</span>
        </a>
        <a href="/org/support" class="nav-link flex items-center gap-4 h-11 px-3 rounded-xl text-gray-600 hover:bg-gray-50 transition font-medium group">
            <i class="fa-regular fa-circle-question w-5 text-center text-gray-400 group-hover:text-blue-900 transition-colors"></i>
            <span class="sidebar-text whitespace-nowrap">Support</span>
        </a>
        <a href="/logout" class="flex items-center gap-4 h-11 px-3 rounded-xl text-red-600 hover:bg-red-50 transition font-medium">
            <i class="fa-solid fa-right-from-bracket w-5 text-center"></i>
            <span class="sidebar-text whitespace-nowrap">Logout</span>
        </a>
    </div>
</aside>

<script>
    document.addEventListener('DOMContentLoaded', async function() {
        
        // --- STEP A: FETCH AND INJECT THE SIDEBAR AND HEADER ---
        try {
            const [headerResponse, sidebarResponse] = await Promise.all([
                fetch('/organization/header.html'), 
                fetch('/organization/sidebar.html')  
            ]);

            if (headerResponse.ok) {
                document.getElementById('headerContainer').innerHTML = await headerResponse.text();
            } else {
                console.error('Failed to load header:', headerResponse.statusText);
            }

            if (sidebarResponse.ok) {
                document.getElementById('sidebarContainer').innerHTML = await sidebarResponse.text();
                
                // 🔥 ETO ANG DAGDAG: Patakbuhin ang pag-highlight pagkatapos mai-inject ang sidebar HTML
                highlightActiveLink();
            } else {
                console.error('Failed to load sidebar:', sidebarResponse.statusText);
            }
        } catch (error) {
            console.error("Critical error loading components:", error);
        }

        // --- FUNCTION PARA SA ACTIVE HIGHLIGHTING ---
        function highlightActiveLink() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link');

            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    // Tanggalin ang default gray hover style
                    link.classList.remove('text-gray-600', 'hover:bg-blue-50/50', 'hover:text-blue-900');
                    
                    // Ibalik ang solid blue style at puting text
                    link.classList.add('bg-blue-900', 'text-white', 'shadow-md');
                    
                    // Gawing puti rin ang icon sa loob nito
                    const icon = link.querySelector('i');
                    if (icon) {
                        icon.classList.remove('text-gray-400', 'group-hover:text-blue-900');
                        icon.classList.add('text-white');
                    }
                }
            });
        }

        // --- STEP B: INITIALIZE YOUR INTERACTION LOGIC ---
        const sidebar = document.getElementById('sidebar');
        const appHeader = document.getElementById('appHeader');
        const mainContent = document.getElementById('mainContent');
        const overlay = document.getElementById('sidebarOverlay');
        
        const collapseBtn = document.getElementById('collapseBtn');
        const collapseIcon = document.getElementById('collapseIcon');
        const mobileToggle = document.getElementById('mobileToggle');
        const notifBtn = document.getElementById('notificationBtn');
        const notifPopup = document.getElementById('notificationPopup');
        const markReadBtn = document.getElementById('markReadBtn');
        const notifList = document.getElementById('notifList');

        // 1. DESKTOP SIDEBAR COLLAPSE
        if (collapseBtn && sidebar) {
            collapseBtn.addEventListener('click', function() {
                const isCollapsed = sidebar.getAttribute('data-collapsed') === 'true';
                const newState = !isCollapsed;
                
                sidebar.setAttribute('data-collapsed', newState);
                if (appHeader) appHeader.setAttribute('data-sidebar-collapsed', newState);
                if (mainContent) mainContent.setAttribute('data-sidebar-collapsed', newState);
                
                document.querySelectorAll('.sidebar-text').forEach(el => {
                    el.style.display = newState ? 'none' : '';
                });
                const container = document.getElementById('logoContainer');
                if (container) container.style.justifyContent = newState ? 'center' : 'between';

                if (collapseIcon) {
                    collapseIcon.style.transform = newState ? 'rotate(180deg)' : 'rotate(0deg)';
                }
            });
        }

        // 2. MOBILE DRAWER TOGGLE
        function toggleMobileMenu() {
            if (!sidebar) return;
            const isOpen = sidebar.getAttribute('data-mobile-open') === 'true';
            const newState = !isOpen;

            sidebar.setAttribute('data-mobile-open', newState);
            if (overlay) overlay.setAttribute('data-mobile-open', newState);
            document.body.style.overflow = newState ? 'hidden' : '';
        }

        if (mobileToggle) mobileToggle.addEventListener('click', toggleMobileMenu);
        if (overlay) overlay.addEventListener('click', toggleMobileMenu);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && sidebar && sidebar.getAttribute('data-mobile-open') === 'true') {
                toggleMobileMenu();
            }
        });

        // 3. NOTIFICATION POPUP PANEL
        if (notifBtn && notifPopup) {
            notifBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                const isOpen = notifPopup.getAttribute('data-open') === 'true';
                notifPopup.setAttribute('data-open', !isOpen);
            });

            document.addEventListener('click', function(e) {
                if (!notifBtn.contains(e.target) && !notifPopup.contains(e.target)) {
                    notifPopup.setAttribute('data-open', 'false');
                }
            });
        }

        // Clear Notifications Action
        if (markReadBtn && notifList) {
            markReadBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                const dot = document.querySelector('.notif-dot');
                if (dot) dot.style.display = 'none';
                notifList.innerHTML = `
                    <div class="text-center py-8 text-gray-400 text-sm">
                        <i class="fa-regular fa-bell-slash text-xl block mb-1.5"></i>
                        No new notifications
                    </div>
                `;
                setTimeout(() => {
                    if (notifPopup) notifPopup.setAttribute('data-open', 'false');
                }, 400);
            });
        }
    });
</script>
